  el.dataset.ev = ev.id; el.dataset.date = dIso;
  const open = ev.todos.filter(t=>t.state==="open"||t.state==="postponed").length;
  const done = ev.todos.filter(t=>t.state==="done").length;
  el.innerHTML =
    `<span class="et">${esc(ev.title)}</span>`+
    (h>34?`<span class="em">${fmtMin(ev.startMin)}–${fmtMin(ev.endMin)}${ev.repeat&&ev.repeat!=="none"?" ↻":""}${ev.reminderMin!=null?" 🔔":""}</span>`:"")+
    (ev.todos.length?`<span class="badges"><span class="badge">${done}/${ev.todos.length} ✓${open&&ev.todos.some(t=>t.state==="postponed")?" ·→":""}</span></span>`:"")+
    `<span class="rezH t"></span><span class="rezH b"></span>`;
  return el;
}

function positionNowLine(){
  const nl = document.getElementById("nowLine");
  if(!nl) return;
  const now = new Date();
  const min = now.getHours()*60 + now.getMinutes();
  const i = dayIdx(todayISO());
  if(min < HOUR_START*60 || min > HOUR_END*60 || i<0 || i>=UI.range.days){ nl.style.display="none"; return; }
  nl.style.display = "";
  nl.style.top  = (min - HOUR_START*60)/60*HOUR_PX+"px";
  nl.style.left = i*UI.dayPPD+"px"; nl.style.width = UI.dayPPD+"px";
}
setInterval(positionNowLine, 60000);

/* ════════════════════════════════════════════════════════════
   scroll routing — one rule:
   • horizontal movement (mouse, touch, trackpad) moves the entire
     scene: timeline + daily slide together as one map
   • vertical movement on the timeline area is routed to the daily
     view (because the timeline doesn't move vertically — there's
     nothing above it to reveal; what scrolling down does is bring
     the rest of the day's hours into view)
   • vertical movement on the daily area scrolls the daily view
     itself (the hour rail)
   The daily view is the master scroller; the timeline mirrors its
   horizontal position. Touch and wheel events on the timeline are
   intercepted and forwarded.
   ════════════════════════════════════════════════════════════ */

/* horizontal sync: bidirectional, with edge-extension for unbounded scroll */
$dayWrap.addEventListener("scroll", ()=>{
  if(UI.syncing){ UI.syncing=false; } else { UI.syncing=true; $tlWrap.scrollLeft = $dayWrap.scrollLeft; }
  scheduleExtend();
});
$tlWrap.addEventListener("scroll", ()=>{
  if(UI.syncing){ UI.syncing=false; } else { UI.syncing=true; $dayWrap.scrollLeft = $tlWrap.scrollLeft; }
  scheduleExtend();
});

/* vertical handoff: outer (#app) consumes downward delta until the timeline
   is fully collapsed under the topbar; remainder goes to dayWrap's hour scroll.
   Upward: drain dayWrap first, then pull the timeline back into view. */
const $appEl = document.getElementById("app");
function routeY(dy){
  if(dy > 0){
    const room = $appEl.scrollHeight - $appEl.clientHeight - $appEl.scrollTop;
    if(room > 0.5){ const used = Math.min(room, dy); $appEl.scrollTop += used; dy -= used; }
    if(dy) $dayWrap.scrollTop += dy;
  } else if(dy < 0){
    const room = $dayWrap.scrollTop;
    if(room > 0.5){ const used = Math.min(room, -dy); $dayWrap.scrollTop -= used; dy += used; }
    if(dy) $appEl.scrollTop += dy;
  }
}
/* wheel on the timeline area: route vertical delta to the daily view.
   Native horizontal still scrolls tlWrap, which mirrors via the sync handler. */
$tlWrap.addEventListener("wheel", e=>{
  if(e.deltaY){
    e.preventDefault();
    routeY(e.deltaY);
  }
  if(e.deltaX){
    e.preventDefault();
    $dayWrap.scrollLeft += e.deltaX;
  }
}, { passive:false });

/* touch on the timeline area:
   - native panning is disabled (touch-action:none) so we can route both axes ourselves
   - horizontal delta → dayWrap.scrollLeft (which syncs back to tlWrap)
   - vertical delta → dayWrap.scrollTop (timeline area itself doesn't move vertically) */
$tlWrap.style.touchAction = "none";
let _tlT = null;
let longPressTimer = null;

$tlWrap.addEventListener("touchstart", (e) => {
  if (e.touches.length === 1) {
    _tlT = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    
    // START LONG-PRESS TIMER (Only if not touching a phase bar)
    if (!e.target.closest(".phase")) {
      longPressTimer = setTimeout(() => {
        if (navigator.vibrate) navigator.vibrate(50);
        const pos = tlPos(e.touches[0]);
        openModal({ type: "phase", draft: { start: idxDate(pos), end: idxDate(pos) } });
      }, 500);
    }
  }
}, { passive: true });

/* ════════════════════════════════════════════════════════════
   Timeline Touch Pipeline: Routing, Edge-Scrolling, Long-Press Add*/
$tlWrap.addEventListener("touchmove", (e) => {
  // Clear long-press if user moves (it's a drag, not a creation intent)
  if (longPressTimer) clearTimeout(longPressTimer);
  
  if (!_tlT || e.touches.length !== 1 || UI.dragLive) return;
  
  const t = e.touches[0];
  const dx = _tlT.x - t.clientX, dy = _tlT.y - t.clientY;

  if (Math.abs(dx) >= 1 || Math.abs(dy) >= 1) {
    // 1. Edge-Scrolling Logic
    const rect = $tlWrap.getBoundingClientRect();
    const EDGE_THRESHOLD = 50;
    if (t.clientX > rect.right - EDGE_THRESHOLD) $tlWrap.scrollLeft += 15;
    else if (t.clientX < rect.left + EDGE_THRESHOLD) $tlWrap.scrollLeft -= 15;

    // 2. Standard Routing
    $dayWrap.scrollLeft += dx;
    routeY(dy);
    _tlT.x = t.clientX; _tlT.y = t.clientY;
    if (e.cancelable) e.preventDefault();
  }
}, { passive: false });

$tlWrap.addEventListener("touchend", () => {
  clearTimeout(longPressTimer);
  _tlT = null;
}, { passive: true });

$tlWrap.addEventListener("touchcancel", () => {
  clearTimeout(longPressTimer);
  _tlT = null;
}, { passive: true });

/* wheel over the daily view: route vertically so the timeline collapses first */
$dayWrap.addEventListener("wheel", e=>{
  if(e.ctrlKey || !e.deltaY) return;        /* keep pinch-zoom + pure-horizontal native */
  e.preventDefault();
  routeY(e.deltaY);
}, { passive:false });

/* touch over the daily view: manual routing only while the timeline is still
   (partially) visible. Dynamically attaches/detaches the passive:false listener
   to prevent scroll-lag when native panning takes over. */
let _dwT = null;
const dwTouchMove = e => {
  if(!_dwT || e.touches.length !== 1 || UI.dragLive) return;
  const t = e.touches[0];
  const dx = _dwT.x - t.clientX, dy = _dwT.y - t.clientY;
  if(Math.abs(dx) >= 1 || Math.abs(dy) >= 1){
    $dayWrap.scrollLeft += dx;
    routeY(dy);
    _dwT.x = t.clientX; _dwT.y = t.clientY;
    if(e.cancelable) e.preventDefault();
  }
};

let dwTouchAttached = false;
function updateDayWrapRouting() {
  const room = $appEl.scrollHeight - $appEl.clientHeight - $appEl.scrollTop;
  const needsRouting = room > 0.5;
  if(needsRouting && !dwTouchAttached) {
    $dayWrap.addEventListener("touchmove", dwTouchMove, { passive:false });
    dwTouchAttached = true;
  } else if(!needsRouting && dwTouchAttached) {
    $dayWrap.removeEventListener("touchmove", dwTouchMove);
    dwTouchAttached = false;
    _dwT = null;
  }
}

$appEl.addEventListener("scroll", updateDayWrapRouting, { passive: true });
window.addEventListener("resize", updateDayWrapRouting, { passive: true });
updateDayWrapRouting(); /* initial eval */

$dayWrap.addEventListener("touchstart", e=>{
  const room = $appEl.scrollHeight - $appEl.clientHeight - $appEl.scrollTop;
  _dwT = (e.touches.length === 1 && room > 0.5)
       ? { x:e.touches[0].clientX, y:e.touches[0].clientY } : null;
}, { passive:true });
$dayWrap.addEventListener("touchend",    ()=>{ _dwT = null; }, { passive:true });
$dayWrap.addEventListener("touchcancel", ()=>{ _dwT = null; }, { passive:true });

/* dynamic range extension when scrolling near either edge */
let _extendT = null;
function scheduleExtend(){
  clearTimeout(_extendT);
  _extendT = setTimeout(()=>{ if(!UI.dragLive) maybeExtendRange(); }, 80);
}
function maybeExtendRange(){
  const w = $dayWrap.scrollLeft, max = $dayWrap.scrollWidth - $dayWrap.clientWidth;
  if(w < EDGE_BUFFER_PX){
    /* prepend EXTEND_DAYS — preserve visual scroll position */
    UI.range.start = isoDate(addDays(parseISO(UI.range.start), -EXTEND_DAYS));
    UI.range.days += EXTEND_DAYS;
    renderAll();
    const delta = EXTEND_DAYS * TL_PPD;
    UI.syncing = true; $dayWrap.scrollLeft = w + delta;
    UI.syncing = true; $tlWrap.scrollLeft  = w + delta;
    return true;
  }
  if(max - w < EDGE_BUFFER_PX){
    UI.range.days += EXTEND_DAYS;
    renderAll();
    return true;
  }
  return false;
}

/* auto-landing: open on today, near current hour */
function scrollToToday(animated){
  const i = dayIdx(todayISO());
  const x = Math.max(0, i*UI.dayPPD - 0);
  $dayWrap.scrollTo({ left:x, behavior:animated?"smooth":"auto" });
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  const y = clamp((nowMin - HOUR_START*60 - 90)/60*HOUR_PX, 0, GRID_H);
  $dayWrap.scrollTop = y;
}
</script>
<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   input — unified Pointer Events pipeline, drag machines
   one pipeline for mouse / touch / pen; branch on pointerType only
   ════════════════════════════════════════════════════════════ */
const MOVE_THRESHOLD = 5, LONGPRESS = 500, EDGE = 7;

/* Dynamic setter for UI.dragLive: only attaches the heavy passive:false touchmove
   listener when a drag is actively occurring, ensuring zero lag during normal scrolling. */
let _dragLive = false;
const globalDragSuppressor = e => e.preventDefault();
Object.defineProperty(UI, 'dragLive', {
  get() { return _dragLive; },
  set(v) {
    if(_dragLive === v) return;
    _dragLive = v;
    if(v) window.addEventListener("touchmove", globalDragSuppressor, { passive: false });
    else window.removeEventListener("touchmove", globalDragSuppressor);
  }
});

function gridPos(e){
  const g = document.getElementById("dayGrid").getBoundingClientRect();
  const x = e.clientX - g.left, y = e.clientY - g.top;
  const day = clamp(Math.floor(x / UI.dayPPD), 0, UI.range.days-1);
  const min = snapMin(HOUR_START*60 + y/HOUR_PX*60);
  return { x, y, day, min };
}
function tlPos(e){
  const r = $tlInner.getBoundingClientRect();
  return clamp(Math.floor((e.clientX - r.left - railW())/TL_PPD), 0, UI.range.days-1);
}
function vibrate(ms){ if(navigator.vibrate) try{ navigator.vibrate(ms); }catch(_){} }

/* ---------- add mode ---------- */
const $fab = document.getElementById("fab");
function setAddMode(on){
  UI.addMode = on;
  $fab.classList.toggle("on", on);
  $fab.title = on ? "Hinzufügen beenden (Esc)" : "Hinzufügen (A)";
  document.getElementById("dayGrid")?.classList.toggle("addmode", on);
  if(!on){ hideHover(); }
}
$fab.addEventListener("click", ()=> setAddMode(!UI.addMode));

function hideHover(){
  const h=document.getElementById("hoverLine"), l=document.getElementById("hoverLab"), t=document.getElementById("tlHover");
  if(h) h.style.display="none"; if(l) l.style.display="none"; if(t) t.style.display="none";
}

/* ---------- day grid pipeline ---------- */
let drag = null;   // { kind, ... } the live drag machine
let lpTimer = null;

$dayWrap.addEventListener("pointermove", e=>{
  if(drag) return;
  if(!UI.addMode){ hideHover(); return; }
  const grid = document.getElementById("dayGrid");
  if(!grid) return;
  const r = grid.getBoundingClientRect();
  if(e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom){ hideHover(); return; }
  const p = gridPos(e);
  const y = (p.min - HOUR_START*60)/60*HOUR_PX;
  const hl = document.getElementById("hoverLine"), lab = document.getElementById("hoverLab");
  hl.style.display=""; hl.style.top = y+"px";
  lab.style.display=""; lab.style.top = y+"px"; lab.textContent = fmtMin(p.min);
  /* timeline hover mirror */
  const th = document.getElementById("tlHover");
  th.style.display=""; th.style.left = (p.day+.5)*TL_PPD+"px";
});
$dayWrap.addEventListener("pointerleave", ()=>{ if(!drag) hideHover(); });

$dayWrap.addEventListener("pointerdown", e=>{
  if(e.button!==undefined && e.button!==0) return;
  const grid = document.getElementById("dayGrid"); if(!grid) return;
  const card = e.target.closest(".evcard");
  if(card){ cardPointerDown(e, card); return; }
  if(!grid.contains(e.target) && e.target!==grid) return;

  const p = gridPos(e);
  if(UI.addMode){
    startCreateDrag(e, p);
  } else if(e.pointerType !== "mouse"){
    /* long-press on empty space (touch/pen): create directly, no add-mode needed */
    const sx=e.clientX, sy=e.clientY;
    lpTimer = setTimeout(()=>{
      vibrate(12);
      const start = snapMin(p.min - 0);
      openModal({ type:"event", draft:{ date:idxDate(p.day), startMin:start, endMin:clamp(start+60, start+SNAP, HOUR_END*60) } });
    }, LONGPRESS);
    const cancel = ev=>{
      if(Math.hypot(ev.clientX-sx, ev.clientY-sy) > MOVE_THRESHOLD) clearTimeout(lpTimer);
    };
    const off = ()=>{ clearTimeout(lpTimer); window.removeEventListener("pointermove",cancel); window.removeEventListener("pointerup",off); window.removeEventListener("pointercancel",off); };
    window.addEventListener("pointermove", cancel);
    window.addEventListener("pointerup", off); window.addEventListener("pointercancel", off);
  }
});

function startCreateDrag(e, p){
  const grid = document.getElementById("dayGrid");
  grid.setPointerCapture(e.pointerId);
  UI.dragLive = true;
  drag = { kind:"create", day:p.day, a:p.min, b:p.min, moved:false, prev:null, labs:[] };
  const move = ev=>{
    const q = gridPos(ev);
    if(Math.abs(q.min - drag.a) >= SNAP) drag.moved = true;
    drag.b = q.min;
    drawCreatePreview(grid, drag);
  };
  const up = ()=>{
    grid.releasePointerCapture(e.pointerId);
    window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); window.removeEventListener("pointercancel",up);
    UI.dragLive = false;
    const d = drag; drag = null;
    if(!d.moved){ clearPreview(d); return; }   // click without drag does nothing
    const s = Math.min(d.a,d.b), en = Math.max(d.a,d.b);
    openModal({ type:"event", draft:{ date:idxDate(d.day), startMin:s, endMin:Math.max(en, s+SNAP) }, preview:d });
  };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up); window.addEventListener("pointercancel",up);
}
function drawCreatePreview(grid, d){
  if(!d.prev){
    d.prev = document.createElement("div"); d.prev.className="dragPrev"; grid.appendChild(d.prev);
    const rail = document.getElementById("hourRail");
    d.labs = [0,1].map(()=>{ const s=document.createElement("span"); s.className="snapLab"; rail.appendChild(s); return s; });
  }
  const s = Math.min(d.a,d.b), e = Math.max(d.a,d.b);
  const y1 = (s-HOUR_START*60)/60*HOUR_PX, y2 = (e-HOUR_START*60)/60*HOUR_PX;
  d.prev.style.cssText += `;left:${d.day*UI.dayPPD+4}px;width:${UI.dayPPD-8}px;top:${y1}px;height:${Math.max(y2-y1,4)}px`;
  d.labs[0].style.top=y1+"px"; d.labs[0].textContent=fmtMin(s);
  d.labs[1].style.top=y2+"px"; d.labs[1].textContent=fmtMin(e);
}
function clearPreview(d){
  if(d && d.prev) d.prev.remove();
  if(d && d.labs) d.labs.forEach(l=>l.remove());
}

/* ---------- existing card: move / resize / copy-move ---------- */
function cardPointerDown(e, cardEl){
  const ev = S.events.find(x=>x.id===cardEl.dataset.ev); if(!ev) return;
  const dateISO = cardEl.dataset.date;
  const rect = cardEl.getBoundingClientRect();
  const zone = (e.clientY - rect.top) <= EDGE ? "t" : (rect.bottom - e.clientY) <= EDGE ? "b" : "move";
  const copy = e.ctrlKey || e.metaKey;
  const startP = gridPos(e);
  let armed = e.pointerType === "mouse" || e.pointerType === "pen" || zone!=="move";
  let armTimer = null;

  if(!armed){ /* touch move needs long-press confirmation */
    armTimer = setTimeout(()=>{ armed = true; UI.dragLive = true; vibrate(12); cardEl.classList.add("dragging"); }, LONGPRESS);
  }
  cardEl.setPointerCapture(e.pointerId);
  const st = { moved:false, day:startP.day,
               s:ev.startMin, en:ev.endMin, grabOff: startP.min - ev.startMin };
  const pv = { day:startP.day, a:ev.startMin, b:ev.endMin, prev:null, labs:[] };

  const move = mv=>{
    const q = gridPos(mv);
    if(!armed){
      if(Math.hypot(mv.clientX-e.clientX, mv.clientY-e.clientY) > MOVE_THRESHOLD) clearTimeout(armTimer);
      return;
    }
    if(!st.moved && Math.hypot(mv.clientX-e.clientX, mv.clientY-e.clientY) <= MOVE_THRESHOLD && zone==="move") return;
    if(!st.moved){ st.moved=true; UI.dragLive=true; if(!copy) cardEl.classList.add("dragging"); }
    if(zone==="move"){
      const dur = ev.endMin - ev.startMin;
      st.s  = clamp(snapMin(q.min - st.grabOff), HOUR_START*60, HOUR_END*60 - dur);
      st.en = st.s + dur; st.day = q.day;
    } else if(zone==="t"){ st.s = Math.min(snapMin(q.min), ev.endMin - SNAP); }
    else { st.en = Math.max(snapMin(q.min), ev.startMin + SNAP); }
    pv.day = st.day; pv.a = st.s; pv.b = st.en;
    drawCreatePreview(document.getElementById("dayGrid"), pv);
  };
  const up = ()=>{
    clearTimeout(armTimer);
    try{ cardEl.releasePointerCapture(e.pointerId); }catch(_){}
    window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); window.removeEventListener("pointercancel",up);
    cardEl.classList.remove("dragging");
    UI.dragLive = false;
    clearPreview(pv);
    if(!st.moved){ openTodoPop(ev, dateISO, cardEl); return; }   // plain click → todo panel
    const dayDelta = st.day - dayIdx(dateISO);
    if(copy){
      mutate(s=>{
        s.events.push({ ...structuredClone(ev), id:uid(), repeat:"none",
          date: idxDate(st.day), startMin: st.s, endMin: st.en,
          todos: ev.todos.map(t=>({...t, id:uid()})) });
      });
      toast("Kopie erstellt");
    } else {
      mutate(s=>{
        const t = s.events.find(x=>x.id===ev.id);
        t.startMin = st.s; t.endMin = st.en;
        if(dayDelta) t.date = isoDate(addDays(parseISO(t.date), dayDelta));  // series shifts as a whole
      });
    }
  };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up); window.addEventListener("pointercancel",up);
}

/* ---------- timeline pipeline: create phase/point, resize phases, open editors ---------- */
$tlWrap.addEventListener("pointermove", e=>{
  if(drag || !UI.addMode) return;
  const th = document.getElementById("tlHover");
  if(th){ th.style.display=""; th.style.left = (tlPos(e)+.5)*TL_PPD+"px"; }
});
$tlWrap.addEventListener("pointerdown", e=>{
  if(e.button!==undefined && e.button!==0) return;

  /* resize handles on phase bars */
  const handle = e.target.closest(".ph-handle");
  if(handle){
    const phEl = handle.closest(".phase");
    const ph = S.phases.find(p=>p.id===phEl.dataset.phase); if(!ph) return;
    const side = handle.dataset.rez;
    phEl.setPointerCapture(e.pointerId); UI.dragLive = true;
    let ns = ph.start, ne = ph.end;
    const move = mv=>{
      const d = idxDate(tlPos(mv));
      const rect = $tlWrap.getBoundingClientRect();
      const EDGE_THRESHOLD = 50;
      if (mv.clientX > rect.right - EDGE_THRESHOLD) $tlWrap.scrollLeft += 15;
      else if (mv.clientX < rect.left + EDGE_THRESHOLD) $tlWrap.scrollLeft -= 15;
      /* --------------------------------- */

      if(side==="l") ns = d <= ph.end ? d : ph.end; else ne = d >= ph.start ? d : ph.start;
      const x = dayIdx(ns)*TL_PPD, w = Math.max((diffDays(ns,ne)+1)*TL_PPD, 26);
      phEl.style.left = x+"px"; phEl.style.width = w+"px";
    };
    const up = ()=>{
      try{ phEl.releasePointerCapture(e.pointerId); }catch(_){}
      window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); window.removeEventListener("pointercancel",up);
      UI.dragLive = false;
      if(ns!==ph.start || ne!==ph.end) mutate(s=>{ const t=s.phases.find(p=>p.id===ph.id); t.start=ns; t.end=ne; });
    };
    window.addEventListener("pointermove",move); window.addEventListener("pointerup",up); window.addEventListener("pointercancel",up);
    return;
  }

  /* expand arrow / edit clicks are handled in the click handler below */
  if(e.target.closest(".ph-exp,.phase,.exam,.ms,.projLabel")) return;

  /* add-mode drag on empty timeline → phase (multi-day) or point (single day) */
  if(!UI.addMode) return;
  const a = tlPos(e);
  $tlWrap.setPointerCapture(e.pointerId); UI.dragLive = true;
  let b = a, ghost = null, moved = false;
  const move = mv=>{
    b = tlPos(mv); if(b!==a) moved = true;
    if(!ghost){ ghost = document.createElement("div"); ghost.className="tlCreate"; ghost.style.top="4px"; $tlInner.firstChild.appendChild(ghost); }
    const lo = Math.min(a,b), hi = Math.max(a,b);
    ghost.style.left = lo*TL_PPD+"px"; ghost.style.width = (hi-lo+1)*TL_PPD+"px";
    ghost.style.top = (e.clientY - $tlInner.getBoundingClientRect().top - 12)+"px";
  };
  const up = ()=>{
    try{ $tlWrap.releasePointerCapture(e.pointerId); }catch(_){}
    window.removeEventListener("pointermove",move); window.removeEventListener("pointerup",up); window.removeEventListener("pointercancel",up);
    UI.dragLive = false;
    if(ghost) ghost.remove();
    if(!moved) return;                              // click without drag does nothing
    const lo = idxDate(Math.min(a,b)), hi = idxDate(Math.max(a,b));
    if(lo===hi) openModal({ type:"point", draft:{ date:lo } });
    else        openModal({ type:"phase", draft:{ start:lo, end:hi } });
  };
  window.addEventListener("pointermove",move); window.addEventListener("pointerup",up); window.addEventListener("pointercancel",up);
});

/* click routing on the timeline (expand, edit) */
$tlWrap.addEventListener("click", e=>{
  const exp = e.target.closest("[data-expand]");
  if(exp){
    mutate(s=>{ const p = s.phases.find(x=>x.id===exp.dataset.expand); p.expanded = !p.expanded; });
    return;
  }
  const phEl = e.target.closest(".phase");
  if(phEl){ const ph = S.phases.find(p=>p.id===phEl.dataset.phase); if(ph) openModal({ type:"phase", edit:ph }); return; }
  const xEl = e.target.closest("[data-edit-exam]");
  if(xEl){ const x = S.exams.find(v=>v.id===xEl.dataset.editExam); if(x) openModal({ type:"exam", edit:x }); return; }
  const mEl = e.target.closest("[data-edit-milestone]");
  if(mEl){
    const [pid,mid] = mEl.dataset.editMilestone.split("/");
    const p = S.categories.find(v=>v.id===pid && v.start && v.end); const m = p && (p.milestones||[]).find(v=>v.id===mid);
    if(m) openModal({ type:"milestone", edit:m, project:p });
    return;
  }
  const prEl = e.target.closest("[data-edit-project]");
  if(prEl){ toggleSettings(true); }
});
</script>
<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   modal — draft modal (preview persists behind it), todo editor,
   postponed carry-over
   ════════════════════════════════════════════════════════════ */
function getCarryover(catId, dateISO, excludeId){
  /* todos of the category's most recent event whose latest occurrence is still postponed */
  let best = null, bestKey = "";
  S.events.forEach(ev=>{
    if(ev.categoryId !== catId || ev.id === excludeId) return;
    if(!ev.todos.some(t=>t.state === "postponed")) return;
    const occ = latestOccurrence(ev, dateISO);
    if(!occ) return;
    const key = occ + "T" + String(ev.startMin).padStart(4,"0");   // date, then start time
    if(key > bestKey){ bestKey = key; best = ev; }
  });
  if(!best) return [];
  const seen = new Set();
  return best.todos.filter(t=>{
    const k = t.text.trim();                                        // dedup key: trimmed text
    if(t.state !== "postponed" || seen.has(k)) return false;
    seen.add(k); return true;
  }).map(t=>({ id:uid(), text:t.text, state:"open", carried:true }));
}

function catDots(sel){
  return `<div class="catdots">`+S.categories.map(c=>
    `<button class="catdot${c.id===sel?" on":""}" data-cat="${c.id}" style="background:${c.color}" title="${esc(c.name)}"></button>`).join("")+`</div>`;
}
function todoRowHTML(t){
  return `<div class="todoRow" data-state="${t.state}" data-tid="${t.id}">
    <button class="tcheck" title="Klick: Status · Rechtsklick: verschoben">${t.state==="done"?"✓":t.state==="cancelled"?"✕":t.state==="postponed"?"→":""}</button>
    <span class="tx">${esc(t.text)}</span>
    ${t.carried?`<span class="carry">↻</span>`:""}
    <button class="tdel" title="Löschen">✕</button>
  </div>`;
}
function cycleTodo(t){ t.state = t.state==="open" ? "done" : t.state==="done" ? "cancelled" : "open"; }

function openModal(ctx){
  closeModal();
  UI.modal = ctx;
  const ed = ctx.edit;
  if(ctx.type==="point") ctx.pointKind = ctx.pointKind || "exam";
  if(ctx.type==="event" && !ed){
    ctx.draft.todos = getCarryover(ctx.draft.categoryId, ctx.draft.date, null);
  }
  const ov = document.createElement("div");
  ov.className = "overlay"; ov.id = "modalOv";
  ov.innerHTML = `<div class="mcard">
    <div class="mhead">
      <div id="mTitleBox" style="flex:1; min-width:0"></div>
      <button class="cbtn small" id="mClose" title="Abbrechen (Esc)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      <button class="cbtn small danger" id="mDelete" style="display:none" title="Löschen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/></svg></button>
      <button class="cbtn small primary" id="mSave" title="Speichern (Strg+Enter)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></button>
    </div>
    <div class="mbody" id="mBody"></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("pointerdown", e=>{ if(e.target===ov) closeModal(); });
  ov.querySelector("#mClose").onclick = closeModal;
  ov.querySelector("#mSave").onclick = saveModal;
  renderModalBody();
}
function closeModal(){
  const ov = document.getElementById("modalOv");
  if(ov) ov.remove();
  if(UI.modal && UI.modal.preview) clearPreview(UI.modal.preview);   // preview persisted behind the modal until now
  UI.modal = null;
}

function renderModalBody(){
  const ctx = UI.modal, ed = ctx.edit, B = document.getElementById("mBody");
  const T = document.getElementById("mTitle");
  const v = (ed||ctx.draft||{});
  let h = "";
  const titleField = (placeholder,val)=>{
    document.getElementById("mTitleBox").innerHTML =
      `<div class="field title-field"><textarea id="fTitle" class="title-inline" rows="1" placeholder="${esc(placeholder||"")}" autocomplete="off">${esc(val||"")}</textarea></div>`;
    return "";
  };
  const dateField  = (id,lab,val)=>`<div class="field"><label>${lab}</label><input id="${id}" type="date" value="${val||todayISO()}"></div>`;
  const trackPicker = (selectedId)=>{
    const projs = S.categories.filter(c=>c.start && c.end);
    const cats  = S.categories.filter(c=>!c.start && !c.end);
    return `<div class="field"><label>Projekt / Kategorie</label>
      <div class="proj-row">
        <select id="fProj">
          <option value="">— frei —</option>
          ${projs.length?`<optgroup label="Projekte">${projs.map(p=>`<option value="${p.id}" ${selectedId===p.id?"selected":""}>${esc(p.name)}</option>`).join("")}</optgroup>`:""}
          ${cats.length?`<optgroup label="Kategorien">${cats.map(c=>`<option value="${c.id}" ${selectedId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</optgroup>`:""}
        </select>
        <span class="proj-col" id="fProjCol"></span>
      </div></div>`;
  };

  if(ctx.type==="point"){
    h += `<div class="seg" id="pointSeg">
      <button data-k="exam" class="${ctx.pointKind==="exam"?"on":""}">Prüfung</button>
      <button data-k="milestone" class="${ctx.pointKind==="milestone"?"on":""}" ${S.categories.some(c=>c.start&&c.end)?"":"disabled"}>Meilenstein</button></div>`;
  }
  const kind = ctx.type==="point" ? ctx.pointKind : ctx.type;

  if(kind==="event"){
    h += titleField(ed ? "Termin bearbeiten" : "Neuer Termin", v.title);
    h += trackPicker(v.categoryId);
    h += `<div class="frow">${dateField("fDate","Datum",v.date)}
      <div class="field"><label>Von</label><input id="fStart" type="time" step="900" value="${fmtMin(v.startMin??9*60)}"></div>
      <div class="field"><label>Bis</label><input id="fEnd" type="time" step="900" value="${fmtMin(v.endMin??10*60)}"></div></div>`;
    h += `<div class="frow"><div class="field"><label>Wiederholung</label><select id="fRepeat">
      ${["none|Keine","daily|Täglich","weekly|Wöchentlich","monthly|Monatlich","weekdays|Werktags"].map(o=>{const[k,l]=o.split("|");return `<option value="${k}" ${ (v.repeat||"none")===k?"selected":""}>${l}</option>`;}).join("")}</select></div>
      <div class="field"><label>Erinnerung</label><select id="fRem">
      ${["|Keine","0|Zum Start","5|5 min","15|15 min","30|30 min","60|1 h","1440|1 Tag"].map(o=>{const[k,l]=o.split("|");return `<option value="${k}" ${String(v.reminderMin??"")===k?"selected":""}>${l}</option>`;}).join("")}</select></div></div>`;
    h += `<div class="field"><label>Todos</label><div class="todoList" id="mTodos">${(v.todos||[]).map(todoRowHTML).join("")}</div>
      <div class="todoAdd" style="margin-top:6px"><input id="fNewTodo" placeholder="Todo hinzufügen…">
      <button class="cbtn small" id="fAddTodo" title="Hinzufügen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button></div>
      ${(v.todos||[]).some(t=>t.carried)?`<div class="thint" style="margin-top:5px">↻ aus dem letzten Termin dieser Kategorie übernommen (war verschoben)</div>`:""}</div>`;
  }
  else if(kind==="phase"){
    h += titleField(ed ? "Phase bearbeiten" : "Neue Phase", v.title);
    h += trackPicker(v.categoryId);
    h += `<div class="frow">${dateField("fStart2","Beginn",v.start)}${dateField("fEnd2","Ende",v.end)}</div>`;
    h += `<div class="field desc-field"><label>Beschreibung</label>
      <div class="rte-tools">
        <button class="cbtn small" data-cmd="bold" title="Fett"><b style="font-size:12px">B</b></button>
        <button class="cbtn small" data-cmd="italic" title="Kursiv"><i style="font-size:12px;font-family:serif">I</i></button>
        <button class="cbtn small" data-cmd="insertUnorderedList" title="Liste"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4.5" cy="6" r="1.4" fill="currentColor" stroke="none"/><circle cx="4.5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="4.5" cy="18" r="1.4" fill="currentColor" stroke="none"/></svg></button>
      </div>
      <div class="rte" id="fDetails" contenteditable="true">${sanitize(v.details||"")}</div></div>`;
  }
  else if(kind==="exam"){
    h += titleField(ed ? "Prüfung bearbeiten" : "Neue Prüfung", v.title);
    h += `<div class="frow">${dateField("fDate","Datum",v.date)}
      <div class="field"><label>Punkte / Notiz</label><input id="fPoints" value="${esc(v.points||"")}" placeholder="z. B. 30 Punkte"></div></div>`;
  }
  else if(kind==="milestone"){
    const projs = S.categories.filter(c=>c.start && c.end);
    h += titleField(ed ? "Meilenstein bearbeiten" : "Neuer Meilenstein", v.label);
    h += `<div class="field"><label>Projekt</label><select id="fProj" ${ed?"disabled":""}>
      ${projs.map(p=>`<option value="${p.id}" ${(ctx.project&&ctx.project.id===p.id)?"selected":""}>${esc(p.name)}</option>`).join("")}</select></div>`;
    h += `<div class="frow">${dateField("fDate","Datum",v.date)}
      <div class="field"><label>&nbsp;</label><label style="display:flex;align-items:center;gap:8px;text-transform:none;font-size:13px;color:var(--text);letter-spacing:0;cursor:pointer">
      <input id="fEndFlag" type="checkbox" ${v.end?"checked":""} style="width:auto"> Abschluss ★</label></div></div>`;
  }
  else if(kind==="project"){
    /* project creation/edit now lives in the settings panel — this branch retained only as a no-op safety net */
    h += titleField(ed ? "Projekt bearbeiten" : "Neues Projekt", v.name);
    h += `<div class="field"><p class="note">Projekte werden im Einstellungs-Panel verwaltet.</p></div>`;
  }
  B.innerHTML = h;

  /* wiring */
  const seg = B.querySelector("#pointSeg");
  if(seg) seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{ ctx.pointKind = b.dataset.k; renderModalBody(); });
  B.querySelectorAll(".rte-tools .cbtn").forEach(b=>b.onclick=e=>{
    e.preventDefault(); document.getElementById("fDetails").focus();
    document.execCommand(b.dataset.cmd, false, null);            // deprecated, fine for this scope
  });
  /* title textarea: wordwrap by auto-growing to scrollHeight; Enter is suppressed (titles are single-line semantically) */
  const _fTitle = document.getElementById("fTitle");
  if(_fTitle && _fTitle.tagName === "TEXTAREA"){
    const grow = ()=>{ _fTitle.style.height = "auto"; _fTitle.style.height = _fTitle.scrollHeight + "px"; };
    _fTitle.addEventListener("input", grow);
    _fTitle.addEventListener("keydown", e=>{ if(e.key === "Enter") e.preventDefault(); });
    requestAnimationFrame(grow);   // initial size after layout settles
  }
  /* unified track dropdown: paints color swatch + (event modal) refreshes carry-over */
  const _fProj = B.querySelector("#fProj"), _fProjCol = document.getElementById("fProjCol");
  if(_fProj && _fProjCol){
    const paint = ()=>{
      const t = S.categories.find(c=>c.id===_fProj.value);
      _fProjCol.style.background = t ? t.color : FREE_COLOR;
    };
    paint();
    _fProj.addEventListener("change", ()=>{
      paint();
      if(ctx.type==="event" && !ed){
        ctx.draft.categoryId = _fProj.value || null;
        ctx.draft.todos = ctx.draft.todos.filter(t=>!t.carried).concat(getCarryover(ctx.draft.categoryId, ctx.draft.date, null));
        renderModalBody();
      }
    });
  }
  const addTodo = ()=>{
    const inp = B.querySelector("#fNewTodo"); const txt = inp.value.trim(); if(!txt) return;
    const list = ed ? ed.todos : ctx.draft.todos;
    list.push({ id:uid(), text:txt, state:"open" }); inp.value="";
    B.querySelector("#mTodos").insertAdjacentHTML("beforeend", todoRowHTML(list[list.length-1]));
  };
  const addBtn = B.querySelector("#fAddTodo");
  if(addBtn){ addBtn.onclick = addTodo;
    B.querySelector("#fNewTodo").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); addTodo(); } }); }
  const tl = B.querySelector("#mTodos");
  if(tl){
    const list = ()=> ed ? ed.todos : ctx.draft.todos;
    tl.addEventListener("click", e=>{
      const row = e.target.closest(".todoRow"); if(!row) return;
      const t = list().find(x=>x.id===row.dataset.tid); if(!t) return;
      if(e.target.closest(".tdel")){ list().splice(list().indexOf(t),1); row.remove(); return; }
      if(e.target.closest(".tcheck")){ cycleTodo(t); row.outerHTML = todoRowHTML(t); }
    });
    tl.addEventListener("contextmenu", e=>{
      const row = e.target.closest(".todoRow"); if(!row) return;
      e.preventDefault();
      const t = list().find(x=>x.id===row.dataset.tid); if(!t) return;
      t.state = t.state==="postponed" ? "open" : "postponed";
      row.outerHTML = todoRowHTML(t);
    });
  }
  const del = document.getElementById("mDelete");
  del.style.display = ed ? "" : "none";
  del.onclick = ()=>{
    const k = ctx.type==="point" ? ctx.pointKind : ctx.type;
    mutate(s=>{
      if(k==="event") s.events = s.events.filter(x=>x.id!==ed.id);
      else if(k==="phase") s.phases = s.phases.filter(x=>x.id!==ed.id);
      else if(k==="exam") s.exams = s.exams.filter(x=>x.id!==ed.id);
      else if(k==="milestone"){ const p=s.categories.find(c=>c.id===ctx.project.id); if(p && p.milestones) p.milestones=p.milestones.filter(m=>m.id!==ed.id); }
    });
    toast(k==="event" && ed.repeat && ed.repeat!=="none" ? "Serie gelöscht" : "Gelöscht");
    closeModal();
  };
  const f = document.getElementById("fTitle"); if(f) f.focus();
}

function saveModal(){
  const ctx = UI.modal, ed = ctx.edit, B = document.getElementById("mBody");
  const kind = ctx.type==="point" ? ctx.pointKind : ctx.type;
  const val = id => { const el=document.getElementById(id); return el?el.value:undefined; };
  const mins = id => { const t=val(id); if(!t) return null; const [h,m]=t.split(":").map(Number); return h*60+m; };

  if(kind==="event"){
    const title = (val("fTitle")||"").trim() || "Termin";
    let s = clamp(mins("fStart")??9*60, HOUR_START*60, HOUR_END*60);
    let e = clamp(mins("fEnd")??s+60, HOUR_START*60, HOUR_END*60);
    if(e<=s) e = Math.min(s+SNAP, HOUR_END*60);
    const data = { title, categoryId: val("fProj")||null,
      date: val("fDate")||todayISO(), startMin:s, endMin:e,
      repeat: val("fRepeat")||"none",
      reminderMin: val("fRem")==="" ? null : Number(val("fRem")),
      todos: (ed?ed.todos:ctx.draft.todos) };
    if(data.reminderMin!=null) requestNotifPermission();
    mutate(st=>{ if(ed) Object.assign(st.events.find(x=>x.id===ed.id), data);
                 else st.events.push({ id:uid(), ...data }); });
    if(UI.addMode) setAddMode(false);
  }
  else if(kind==="phase"){
    let a = val("fStart2")||todayISO(), b = val("fEnd2")||a;
    if(b<a) [a,b]=[b,a];
    const data = { title:(val("fTitle")||"").trim()||"Phase",
      categoryId: val("fProj")||null, start:a, end:b,
      details: sanitize(B.querySelector("#fDetails").innerHTML) };
    mutate(st=>{ if(ed) Object.assign(st.phases.find(x=>x.id===ed.id), data);
                 else st.phases.push({ id:uid(), expanded:false, ...data }); });
    if(UI.addMode) setAddMode(false);
  }
  else if(kind==="exam"){
    const data = { title:(val("fTitle")||"").trim()||"Prüfung", date:val("fDate")||todayISO(), points:(val("fPoints")||"").trim() };
    mutate(st=>{ if(ed) Object.assign(st.exams.find(x=>x.id===ed.id), data);
                 else st.exams.push({ id:uid(), ...data }); });
    if(UI.addMode) setAddMode(false);
  }
  else if(kind==="milestone"){
    const data = { label:(val("fTitle")||"").trim()||"Meilenstein", date:val("fDate")||todayISO(), end:B.querySelector("#fEndFlag").checked };
    mutate(st=>{
      const p = st.categories.find(c=>c.id===(ed?ctx.project.id:val("fProj")) && c.start && c.end);
      if(!p) return;
      if(!p.milestones) p.milestones = [];
      if(ed) Object.assign(p.milestones.find(m=>m.id===ed.id), data);
      else p.milestones.push({ id:uid(), ...data });
    });
    if(UI.addMode) setAddMode(false);
  }
  /* kind==="project" is intentionally not handled — project CRUD lives in settings */
  closeModal();
}

/* ════════════════════════════════════════════════════════════
   todo popover — click a card: quick todo panel in the daily view
   ════════════════════════════════════════════════════════════ */
function openTodoPop(ev, dateISO, anchorEl){
  closePop();
  const r = anchorEl.getBoundingClientRect();
  const pop = document.createElement("div"); pop.id="pop";
  const x = clamp(r.right+10 <= window.innerWidth-310 ? r.right+10 : r.left-310, 8, window.innerWidth-308);
  const y = clamp(r.top, 8, window.innerHeight-300);
  pop.style.left=x+"px"; pop.style.top=y+"px";
  pop.innerHTML = `<button class="cbtn small pclose" title="Schließen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <div class="pt">${esc(ev.title)}</div>
    <div class="pm">${fmtDateLong(dateISO)} · ${fmtMin(ev.startMin)}–${fmtMin(ev.endMin)}${ev.repeat&&ev.repeat!=="none"?" · ↻":""}</div>
    <div class="todoList" id="popTodos">${ev.todos.map(todoRowHTML).join("")}</div>
    <div class="todoAdd" style="margin-top:8px"><input id="popNew" placeholder="Todo hinzufügen…">
      <button class="cbtn small" id="popAdd"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button></div>
    <div class="thint" style="margin-top:7px">Klick: offen → erledigt → abgebrochen · Rechtsklick: verschoben (wandert weiter)</div>
    <div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn" id="popEdit">Bearbeiten</button></div>`;
  document.body.appendChild(pop);
  UI.pop = { evId:ev.id, date:dateISO };

  const sync = mutFn => {                       // mutate without tearing the popover down
    mutate(s=>{ const e2 = s.events.find(x=>x.id===ev.id); if(e2) mutFn(e2); }, { skipRender:true });
    renderAll();
    document.getElementById("popTodos").innerHTML = S.events.find(x=>x.id===ev.id).todos.map(todoRowHTML).join("");
  };
  pop.querySelector(".pclose").onclick = closePop;
  pop.querySelector("#popEdit").onclick = ()=>{ const e2=S.events.find(x=>x.id===ev.id); closePop(); if(e2) openModal({ type:"event", edit:e2 }); };
  const add = ()=>{ const i=pop.querySelector("#popNew"); const t=i.value.trim(); if(!t) return; i.value="";
    sync(e2=>e2.todos.push({ id:uid(), text:t, state:"open" })); };
  pop.querySelector("#popAdd").onclick = add;
  pop.querySelector("#popNew").addEventListener("keydown", e=>{ if(e.key==="Enter") add(); });
  pop.addEventListener("click", e=>{
    const row = e.target.closest(".todoRow"); if(!row) return;
    if(e.target.closest(".tdel")) sync(e2=>{ e2.todos = e2.todos.filter(t=>t.id!==row.dataset.tid); });
    else if(e.target.closest(".tcheck")) sync(e2=>{ const t=e2.todos.find(t=>t.id===row.dataset.tid); if(t) cycleTodo(t); });
  });
  pop.addEventListener("contextmenu", e=>{
    const row = e.target.closest(".todoRow"); if(!row) return;
    e.preventDefault();
    sync(e2=>{ const t=e2.todos.find(t=>t.id===row.dataset.tid); if(t) t.state = t.state==="postponed"?"open":"postponed"; });
  });
}
function closePop(){ const p=document.getElementById("pop"); if(p) p.remove(); UI.pop=null; }
document.addEventListener("pointerdown", e=>{
  if(UI.pop && !e.target.closest("#pop") && !e.target.closest(".evcard")) closePop();
  if(UI.settingsOpen && !e.target.closest("#setPanel") && !e.target.closest("#btnSettings")) toggleSettings(false);
}, true);
</script>
<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   budget — Zeitbudget donut (actual time per category, 7/30 days)
   fed by occurrences (incl. repeats), not by plans
   ════════════════════════════════════════════════════════════ */
function openBudget(){
  closeBudget();
  UI.budgetOpen = true;
  const ov = document.createElement("div"); ov.className="overlay"; ov.id="budgetPage";
  ov.innerHTML = `<div class="mcard"><div class="mhead"><h2>Zeitbudget</h2>
    <button class="cbtn small" id="bClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
    <div class="mbody"><div class="seg" id="bSeg">
      <button data-d="7"  class="${UI.budgetDays===7?"on":""}">7 Tage</button>
      <button data-d="30" class="${UI.budgetDays===30?"on":""}">30 Tage</button></div>
      <div id="bBody"></div>
      <div class="thint">Gemessen wird tatsächlich verplante Zeit aus Terminen (inkl. Wiederholungen) — nicht Phasen oder Pläne.</div>
    </div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener("pointerdown", e=>{ if(e.target===ov) closeBudget(); });
  ov.querySelector("#bClose").onclick = closeBudget;
  ov.querySelectorAll("#bSeg button").forEach(b=>b.onclick=()=>{ UI.budgetDays=+b.dataset.d; openBudget(); });
  renderBudgetBody();
}
function closeBudget(){ const o=document.getElementById("budgetPage"); if(o) o.remove(); UI.budgetOpen=false; }
function renderBudgetBody(){
  const N = UI.budgetDays, to = todayISO(), from = isoDate(addDays(parseISO(to), -(N-1)));
  const sums = new Map();
  occurrencesIn(from, to).forEach(({ev})=>{
    sums.set(ev.categoryId, (sums.get(ev.categoryId)||0) + (ev.endMin - ev.startMin));
  });
  const total = [...sums.values()].reduce((a,b)=>a+b,0);
  const box = document.getElementById("bBody");
  if(!total){ box.innerHTML = `<div class="note" style="padding:14px 0">Keine Termine in den letzten ${N} Tagen. Lege Termine an — hier siehst du dann, wohin deine Zeit tatsächlich ging.</div>`; return; }
  const R=66, C=2*Math.PI*R; let off=0, segs="";
  [...sums.entries()].sort((a,b)=>b[1]-a[1]).forEach(([cid,min])=>{
    const frac = min/total, len = frac*C;
    segs += `<circle r="${R}" cx="90" cy="90" fill="none" stroke="${cat(cid).color}" stroke-width="22"
      stroke-dasharray="${len-2} ${C-len+2}" stroke-dashoffset="${-off}" transform="rotate(-90 90 90)"/>`;
    off += len;
  });
  const hrs = m => (m/60).toFixed(m%60?1:0).replace(".",",")+" h";
  box.innerHTML = `<div class="donutWrap"><svg width="180" height="180" viewBox="0 0 180 180">${segs}
      <text class="donutCenter" x="90" y="88" text-anchor="middle">${hrs(total)}</text>
      <text class="donutSub" x="90" y="104" text-anchor="middle">${N} Tage</text></svg>
    <div class="legend">${[...sums.entries()].sort((a,b)=>b[1]-a[1]).map(([cid,min])=>
      `<div class="legRow"><span class="dot" style="background:${cat(cid).color}"></span>
       <span class="nm">${esc(cat(cid).name)}</span><span class="hrs">${hrs(min)} · ${Math.round(min/total*100)}%</span></div>`).join("")}</div></div>`;
}

/* ════════════════════════════════════════════════════════════
   settings — slide-in panel; no save button, persist() applies live
   ════════════════════════════════════════════════════════════ */
const $set = document.getElementById("setPanel");
function toggleSettings(on){
  UI.settingsOpen = on ?? !UI.settingsOpen;
  if(UI.settingsOpen) renderSettings();
  $set.classList.toggle("open", UI.settingsOpen);
}
function renderSettings(){
  const grey = "#90909a";
  const projs = S.categories.filter(c=>c.start && c.end);
  const cats  = S.categories.filter(c=>!c.start && !c.end);
  /* color picker — 7 palette colors minus grey; colors claimed by any track (except `exceptId`) are disabled */
  const colorPicker = exceptId => {
    const claimed = new Map(S.categories.filter(c=>c.id!==exceptId).map(c=>[c.color, c.name]));
    return `<div class="cpicker">${PALETTE.filter(c=>c!==grey).map(c=>{
      const taken = claimed.has(c);
      return `<button type="button" class="csw${taken?" taken":""}" data-col="${c}" ${taken?`disabled title="belegt von ${esc(claimed.get(c))}"`:""} style="background:${c}"></button>`;
    }).join("")}</div>`;
  };
  const projForm = `<div class="add-form" id="sNewProjForm">
    ${colorPicker(null)}
    <input id="sNewProjName" type="text" placeholder="Projektname" autocomplete="off">
    <div class="af-dates">
      <input id="sNewProjStart" type="date" value="${todayISO()}">
      <input id="sNewProjEnd" type="date" value="${isoDate(addDays(new Date(), 30))}">
    </div>
    <div class="af-actions">
      <button class="btn" data-act="cancel">Abbrechen</button>
      <button class="btn primary" data-act="save-proj">Speichern</button>
    </div></div>`;
  const catForm = `<div class="add-form" id="sNewCatForm">
    ${colorPicker(null)}
    <input id="sNewCatName" type="text" placeholder="Kategorie-Name" autocomplete="off">
    <div class="af-actions">
      <button class="btn" data-act="cancel">Abbrechen</button>
      <button class="btn primary" data-act="save-cat">Speichern</button>
    </div></div>`;

  $set.innerHTML = `<div style="display:flex;align-items:center;gap:10px"><h2 style="flex:1">Einstellungen</h2>
    <button class="cbtn small" id="sClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>

    <section><h3>Darstellung</h3><div class="seg" id="sTheme">
      <button data-t="dark" class="${S.settings.theme==="dark"?"on":""}">Dunkel</button>
      <button data-t="light" class="${S.settings.theme==="light"?"on":""}">Hell</button></div></section>

    <section><h3>Sichtbare Tage (Zoom)</h3><div class="seg" id="sDens">
      ${[3,5,7].map(d=>`<button data-d="${d}" class="${S.settings.density===d?"on":""}">${d}</button>`).join("")}</div></section>

    <section><h3>Projekte</h3>
      <div id="sProjs">${projs.map(p=>`<div class="catRow" data-pid="${p.id}">
        <span class="colDot" style="background:${p.color}"></span>
        <input type="text" value="${esc(p.name)}" data-f="name">
        <input type="date" value="${p.start}" data-f="start">
        <input type="date" value="${p.end}" data-f="end">
        <button class="cbtn small" data-del title="Löschen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg></button></div>`).join("")}</div>
      <button class="btn" id="sAddProj" style="margin-top:4px">+ Projekt</button>
      ${UI.settingsForm==="proj" ? projForm : ""}</section>

    <section><h3>Kategorien</h3>
      <div id="sCats">${cats.map(c=>`<div class="catRow" data-cid="${c.id}">
        <span class="colDot" style="background:${c.color}"></span>
        <input type="text" value="${esc(c.name)}" data-f="name">
        <button class="cbtn small" data-del title="Löschen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg></button></div>`).join("")}</div>
      <button class="btn" id="sAddCat" style="margin-top:4px">+ Kategorie</button>
      ${UI.settingsForm==="cat" ? catForm : ""}
      <p class="note" style="margin-top:8px">Grau ist fix für „frei". Jede Farbe gehört nur einem Projekt oder einer Kategorie.</p></section>

    <section><h3>Daten</h3><div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" id="sExport">Exportieren</button>
      <button class="btn" id="sImport">Importieren</button>
      <input id="sFile" type="file" accept="application/json" style="display:none"></div>
      <p class="note" style="margin-top:8px">Alles liegt lokal in diesem Browser (localStorage). Export = JSON-Sicherung.</p></section>

    <section><h3>Erinnerungen</h3><p class="note">Benachrichtigungen funktionieren, solange die App offen oder (auf Android) kürzlich im Hintergrund ist. Es gibt keinen Server — bei geschlossener App kann kein Push zugestellt werden.</p></section>`;

  /* wiring */
  $set.querySelector("#sClose").onclick = ()=>toggleSettings(false);
  $set.querySelectorAll("#sTheme button").forEach(b=>b.onclick=()=>{ mutate(s=>{ s.settings.theme=b.dataset.t; }); renderSettings(); });
  $set.querySelectorAll("#sDens button").forEach(b=>b.onclick=()=>{ mutate(s=>{ s.settings.density=+b.dataset.d; }); renderSettings(); });

  /* color-picker click handling (inside the open add form) */
  $set.querySelectorAll(".cpicker").forEach(pk=>pk.addEventListener("click", e=>{
    const sw = e.target.closest(".csw"); if(!sw || sw.classList.contains("taken")) return;
    pk.querySelectorAll(".csw").forEach(x=>x.classList.remove("on"));
    sw.classList.add("on");
  }));

  /* project rows: edit name + dates + delete */
  $set.querySelectorAll("#sProjs .catRow").forEach(row=>{
    const pid = row.dataset.pid;
    row.querySelector('[data-f="name"]').addEventListener("change", e=>mutate(s=>{
      const p = s.categories.find(c=>c.id===pid); if(p) p.name = e.target.value.trim() || "Projekt";
    }));
    row.querySelector('[data-f="start"]').addEventListener("change", e=>mutate(s=>{
      const p = s.categories.find(c=>c.id===pid); if(!p) return;
      p.start = e.target.value; if(p.end < p.start) p.end = p.start;
    }));
    row.querySelector('[data-f="end"]').addEventListener("change", e=>mutate(s=>{
      const p = s.categories.find(c=>c.id===pid); if(!p) return;
      p.end = e.target.value; if(p.end < p.start) p.end = p.start;
    }));
    row.querySelector("[data-del]").onclick = ()=>{
      mutate(s=>{
        s.categories = s.categories.filter(c=>c.id!==pid);
        s.phases.forEach(p=>{ if(p.categoryId===pid) p.categoryId=null; });
        s.events.forEach(e2=>{ if(e2.categoryId===pid) e2.categoryId=null; });
      });
      renderSettings();
    };
  });

  /* category rows: edit name + delete */
  $set.querySelectorAll("#sCats .catRow").forEach(row=>{
    const cid = row.dataset.cid;
    row.querySelector('[data-f="name"]').addEventListener("change", e=>mutate(s=>{
      const c = s.categories.find(x=>x.id===cid); if(c) c.name = e.target.value.trim() || "Kategorie";
    }));
    row.querySelector("[data-del]").onclick = ()=>{
      mutate(s=>{
        s.categories = s.categories.filter(c=>c.id!==cid);
        s.phases.forEach(p=>{ if(p.categoryId===cid) p.categoryId=null; });
        s.events.forEach(e2=>{ if(e2.categoryId===cid) e2.categoryId=null; });
      });
      renderSettings();
    };
  });

  /* + Projekt / + Kategorie buttons */
  $set.querySelector("#sAddProj").onclick = ()=>{ UI.settingsForm = "proj"; renderSettings(); };
  $set.querySelector("#sAddCat").onclick  = ()=>{ UI.settingsForm = "cat";  renderSettings(); };

  const openForm = $set.querySelector(".add-form");
  if(openForm){
    openForm.querySelector('[data-act="cancel"]').onclick = ()=>{ UI.settingsForm = null; renderSettings(); };
    const saveProj = openForm.querySelector('[data-act="save-proj"]');
    const saveCat  = openForm.querySelector('[data-act="save-cat"]');
    if(saveProj){
      saveProj.onclick = ()=>{
        const sw = openForm.querySelector(".csw.on");
        if(!sw){ toast("Farbe wählen"); return; }
        const name  = openForm.querySelector("#sNewProjName").value.trim() || "Projekt";
        let start = openForm.querySelector("#sNewProjStart").value || todayISO();
        let end   = openForm.querySelector("#sNewProjEnd").value   || start;
        if(end < start) [start, end] = [end, start];
        mutate(s=>s.categories.push({ id:uid(), name, color:sw.dataset.col, start, end, milestones:[] }));
        UI.settingsForm = null; renderSettings();
      };
    }
    if(saveCat){
      saveCat.onclick = ()=>{
        const sw = openForm.querySelector(".csw.on");
        if(!sw){ toast("Farbe wählen"); return; }
        const name = openForm.querySelector("#sNewCatName").value.trim() || "Kategorie";
        mutate(s=>s.categories.push({ id:uid(), name, color:sw.dataset.col }));
        UI.settingsForm = null; renderSettings();
      };
    }
    /* focus name input on form open */
    const nameInp = openForm.querySelector('input[type="text"]');
    if(nameInp) setTimeout(()=>nameInp.focus(), 0);
  }

  $set.querySelector("#sExport").onclick = ()=>{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(S,null,2)], {type:"application/json"}));
    a.download = "timeline-export-"+todayISO()+".json"; a.click(); URL.revokeObjectURL(a.href);
  };
  $set.querySelector("#sImport").onclick = ()=>$set.querySelector("#sFile").click();
  $set.querySelector("#sFile").addEventListener("change", e=>{
    const f = e.target.files[0]; if(!f) return;
    f.text().then(t=>{
      const d = JSON.parse(t);
      if(!d || !d.categories || !d.events) throw 0;
      mutate(()=>{ S = migrateData(d); });
      renderSettings(); toast("Import erfolgreich");
    }).catch(()=>toast("Import fehlgeschlagen: ungültige Datei"));
  });
}

/* ════════════════════════════════════════════════════════════
   reminders — Notification API while app is open / recently
   backgrounded; NOTIF_STORE prevents double-firing
   ════════════════════════════════════════════════════════════ */
function requestNotifPermission(){
  if("Notification" in window && Notification.permission==="default") Notification.requestPermission();
}
function checkReminders(){
  if(!("Notification" in window) || Notification.permission!=="granted") return;
  let fired;
  try{ fired = new Set(JSON.parse(localStorage.getItem(NOTIF_STORE)||"[]")); }catch(_){ fired = new Set(); }
  const now = Date.now(), today = todayISO(), tom = isoDate(addDays(parseISO(today),1));
  occurrencesIn(today, tom).forEach(({ev,date})=>{
    if(ev.reminderMin==null) return;
    const d = parseISO(date); d.setMinutes(ev.startMin);
    const fireAt = d.getTime() - ev.reminderMin*60000;
    const key = ev.id+"@"+date;
    if(now >= fireAt && now < d.getTime() && !fired.has(key)){
      fired.add(key);
      try{ new Notification(ev.title, { body:(ev.reminderMin?`In ${ev.reminderMin} min · `:"")+fmtMin(ev.startMin)+"–"+fmtMin(ev.endMin) }); }catch(_){}
    }
  });
  const arr = [...fired].slice(-200);
  localStorage.setItem(NOTIF_STORE, JSON.stringify(arr));
}
setInterval(checkReminders, 30000);

/* ════════════════════════════════════════════════════════════
   keyboard + escape hatches — the "never stuck" principle
   layer order: budget > modal > popover > settings > add-mode
   ════════════════════════════════════════════════════════════ */
document.addEventListener("keydown", e=>{
  const typing = /INPUT|SELECT|TEXTAREA/.test(document.activeElement?.tagName) || document.activeElement?.isContentEditable;
  if(e.key==="Escape"){
    if(UI.budgetOpen) closeBudget();
    else if(UI.modal) closeModal();
    else if(UI.pop) closePop();
    else if(UI.settingsOpen) toggleSettings(false);
    else if(UI.addMode) setAddMode(false);
    return;
  }
  if(typing) return;
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="z"){ e.preventDefault(); e.shiftKey ? redo() : undo(); }
  else if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="y"){ e.preventDefault(); redo(); }
  else if(e.key.toLowerCase()==="a" && !e.ctrlKey && !e.metaKey){ e.preventDefault(); setAddMode(!UI.addMode); }
  else if(e.key.toLowerCase()==="t" && !e.ctrlKey && !e.metaKey){ scrollToToday(true); }
});

/* ════════════════════════════════════════════════════════════
   boot
   ════════════════════════════════════════════════════════════ */
document.getElementById("btnToday").onclick   = ()=>scrollToToday(true);
document.getElementById("btnBudget").onclick  = ()=>UI.budgetOpen ? closeBudget() : openBudget();
document.getElementById("btnSettings").onclick= ()=>toggleSettings();
document.getElementById("btnUndo").onclick    = undo;
document.getElementById("btnRedo").onclick    = redo;

let rzT = null;
window.addEventListener("resize", ()=>{ clearTimeout(rzT); rzT = setTimeout(renderAll, 150); });

renderAll();
updateUndoButtons();
scrollToToday(false);          // auto-landing: today, around the current hour
checkReminders();
</script>
