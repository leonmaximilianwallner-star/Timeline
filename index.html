<style>
/* ============================================================
   styles — all visual rules, CSS variables
   ============================================================ */
:root{
  --base:#111118; --surface:#191923; --surface2:#20202c; --surface3:#2a2a38;
  --line:#2e2e3c; --line-soft:#26262f;
  --text:#ededec; --text-dim:#9b9ba6; --text-faint:#62626e;
  --accent:#e9473a; --add:#6498c0; --success:#8fc14e;
  --c-amber:#f4971f; --c-red:#e9473a; --c-teal:#40838b; --c-blue:#6498c0;
  --c-green:#8fc14e; --c-gray:#90909a; --c-purple:#a060c8; --c-orange:#d86e9a;
  --r-card:14px; --r-small:8px;
  --spring:cubic-bezier(0.34,1.3,0.64,1);
  --soft:cubic-bezier(0.3,1,0.5,1);
  --shadow:0 12px 40px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.35);
  --rail-w:68px;
  --sticky-left:calc(var(--rail-w) + 12px);
}
html[data-theme="light"]{
  --base:#f2f1ee; --surface:#ffffff; --surface2:#f7f6f3; --surface3:#ecebe7;
  --line:#dcdad4; --line-soft:#e6e4df;
  --text:#1d1d24; --text-dim:#5d5d68; --text-faint:#9a9aa4;
  --shadow:0 12px 40px rgba(30,30,40,.18), 0 2px 8px rgba(30,30,40,.10);
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  background:var(--base); color:var(--text);
  font-family:"DM Sans",system-ui,-apple-system,sans-serif;
  font-size:14px; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
::selection{background:rgba(233,71,58,.35)}
button{font-family:inherit; color:inherit; background:none; border:none; cursor:pointer}
input,select,textarea{font-family:inherit; font-size:14px; color:var(--text)}
/* Global: no visible scrollbars anywhere. Scrolling still works on every
   scrollable element — we just hide the chrome (same strategy that makes
   the day-grid vertical scroll feel clean). */
*{ scrollbar-width:none; -ms-overflow-style:none; }
*::-webkit-scrollbar,
*::-webkit-scrollbar-thumb,
*::-webkit-scrollbar-track,
*::-webkit-scrollbar-corner{
  width:0 !important; height:0 !important; display:none !important; background:transparent !important;
}

/* ---------- app frame ---------- */
#app{display:flex; flex-direction:column; height:100%;
overflow-y:auto; overflow-x:clip; overscroll-behavior:contain;
}

/* ---------- top bar ---------- */
#topbar{
  display:flex; align-items:center; gap:10px;
  padding:10px 16px 8px; flex:0 0 auto;
  position:sticky; top:0; z-index:30; background:var(--base);
}
#wordmark{height:16px; display:block; opacity:.95}
#wordmark .wm{fill:var(--text)}
#topdate{font-size:12px; color:var(--text-dim); margin-left:4px; white-space:nowrap}
#topbar .spacer{flex:1}
.cbtn{
  width:34px; height:34px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--surface); border:1px solid var(--line);
  color:var(--text-dim); flex:0 0 auto;
  transition:background .15s, color .15s, transform .15s var(--spring);
}
.cbtn:hover{background:var(--surface2); color:var(--text)}
.cbtn:active{transform:scale(.92)}
.cbtn svg{width:16px; height:16px; display:block}
.cbtn.small{width:26px; height:26px}
.cbtn.small svg{width:13px;height:13px}
.cbtn:focus-visible,button:focus-visible{outline:2px solid var(--c-blue); outline-offset:2px}
.cbtn[disabled]{opacity:.35; pointer-events:none}

/* ---------- timeline (planning layer) ---------- */
#tlWrap{
  flex:0 0 auto; position:relative; background:var(--base);
  overflow:auto; overflow-y:visible;                  /* scrolls in JS-routed manner; chrome hidden globally */
}
#tlInner{position:relative; min-width:100%}
#tlGrid{
  position:absolute; left:var(--rail-w); right:0; top:30px; bottom:14px;
  pointer-events:none; z-index:0;
  background-image: linear-gradient(to right, var(--line-soft) 1px, transparent 1px);
  background-size: var(--tl-ppd, 160px) 100%;
  opacity:.45;
}
.tlRow{ z-index:1 }
.tlRow{position:relative}
#monthRow{display:flex; height:30px; align-items:center}
.monthSpan{position:relative; height:100%; display:flex; align-items:center; border-left:1px solid var(--line-soft)}
.monthSpan:first-child{border-left:none}
.monthLabel{
  position:sticky; left:var(--sticky-left); display:inline-block;
  font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;
  color:var(--text-dim); padding:0 10px; white-space:nowrap;
}
.projRow{height:36px}
.projSpine{position:absolute; top:50%; height:2px; background:var(--line); border-radius:2px}
.projSpine.colored{opacity:.55}
.projLabelWrap{position:absolute; top:0; height:100%; display:flex; align-items:center; pointer-events:none}
.projLabel{
  position:sticky; left:var(--sticky-left); font-size:12px; font-weight:700;
  color:var(--text-dim); background:var(--base); padding:2px 8px; border-radius:9999px;
  pointer-events:auto; white-space:nowrap; letter-spacing:.02em;
}
.ms{position:absolute; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%;
  background:var(--text-dim); border:2px solid var(--base); cursor:pointer; z-index:2}
.ms::after{content:""; position:absolute; left:50%; top:100%; width:1.5px; height:7px; background:var(--line); transform:translateX(-50%)}
.ms.end{background:var(--success); box-shadow:0 0 0 3px rgba(143,193,78,.22)}
.msLabel{
  position:absolute; top:-15px; left:50%; transform:translateX(-50%);
  font-size:10px; color:var(--text-dim); white-space:nowrap; pointer-events:none;
}
.ms.end .msLabel{color:var(--success); font-weight:600}
.laneRow{height:34px}
.phase{
  position:absolute; top:4px; height:24px; border-radius:9999px;
  color:#ededec; cursor:pointer; user-select:none;
  transition:filter .15s;
  /* clip-path clips like overflow:hidden but does NOT create a scroll context,
     which is what lets position:sticky on .ph-stick inside use #tlWrap as its
     scroll ancestor. overflow:hidden would scope sticky to the bar (which
     doesn't scroll) and break it. */
  clip-path: inset(0 round 9999px);
}
.phase:hover{filter:brightness(1.12)}
.phase .ph-stick{
  position:sticky; left:var(--sticky-left, calc(var(--rail-w) + 12px));
  display:inline-flex; align-items:center; gap:6px;
  height:24px; padding:0 12px 0 4px;
  white-space:nowrap; line-height:24px;
}
.phase .ph-exp{
  width:18px; height:18px; flex:0 0 18px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.22); font-size:9px; color:#ededec;
}
.phase .ph-label{ font-size:12px; font-weight:600; }
.phase .ph-handle{position:absolute; top:0; height:100%; width:10px; cursor:ew-resize}
.phase .ph-handle.l{left:0}.phase .ph-handle.r{right:0}
.bubbleRow{padding:2px 0 8px}
.bubbleAnchor{display:flex}
.bubble{
  position:sticky; left:var(--sticky-left);
  border-top:2px solid var(--line);
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card);
  border-top-left-radius:4px;
  padding:10px 14px; max-width:380px; min-width:220px;
  font-size:12.5px; line-height:1.5; color:var(--text-dim);
  box-shadow:0 6px 20px rgba(0,0,0,.25);
  animation:pop .22s var(--spring);
}
.bubble b,.bubble strong{color:var(--text)}
.bubble ul,.bubble ol{padding-left:18px; margin:4px 0}
.bubble:empty::after{content:"Keine Beschreibung"; color:var(--text-faint); font-style:italic}
#examRow{height:52px}
.exam{
  position:absolute; top:6px; transform:translateX(-50%);
  border-radius:9999px; padding:3px 14px 4px; text-align:center;
  color:#ededec; cursor:pointer; white-space:nowrap; line-height:1.15;
}
.exam:hover{filter:brightness(1.12)}
.exam .xt{font-size:12px; font-weight:700; display:block}
.exam .xp{font-size:10px; opacity:.85; display:block}
.exam::after{content:""; position:absolute; left:50%; top:100%; width:1.5px; height:9px; background:var(--line); transform:translateX(-50%)}
#tlAxis{height:14px; border-top:1px solid var(--line-soft)}
.todayLine{position:absolute; top:0; bottom:0; width:2px; background:var(--accent); z-index:3; pointer-events:none; opacity:.85}
.todayLine::before{content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--accent)}
.tlHover{position:absolute; top:0; bottom:0; width:1.5px; background:var(--add); z-index:4; pointer-events:none; display:none}
.tlCreate{position:absolute; height:24px; border:1.5px dashed var(--text-dim); border-radius:9999px; z-index:4; pointer-events:none; background:rgba(100,152,192,.10)}

/* ---------- daily view (execution layer) ---------- */
#dayWrap{flex:0 0 auto; height:calc(100dvh - 52px); /* 52px = topbar (10+8 pad + 34 btn) */
  overflow:auto; position:relative; background:var(--base)}
#dayInner{position:relative}
#dayHead{
  position:sticky; top:0; z-index:20; display:flex;
  background:var(--base); border-bottom:1px solid var(--line);
  height:52px;
}
#dayHeadCorner{
  position:sticky; left:0; z-index:21; flex:0 0 var(--rail-w); width:var(--rail-w);
  background:var(--base); border-right:1px solid var(--line-soft);
}
.dh{
  flex:0 0 auto; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1px; border-left:1px solid var(--line-soft); user-select:none;
}
.dh:first-of-type{border-left:none}
.dh .dw{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); font-weight:600}
.dh .dn{font-size:14px; font-weight:600; color:var(--text-dim); width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center}
.dh.today .dn{background:var(--accent); color:#fff}
.dh.today .dw{color:var(--accent)}
.dh.weekend .dw{opacity:.6}
#dayBody{display:flex; position:relative}
#hourRail{
  position:sticky; left:0; z-index:15; flex:0 0 var(--rail-w); width:var(--rail-w);
  background:var(--base); border-right:1px solid var(--line-soft);
  font-family:"DM Mono",monospace; font-size:10px; color:var(--text-faint);
  position:sticky;
}
.hr-lab{position:absolute; right:8px; transform:translateY(-50%)}
#dayGrid{position:relative; flex:0 0 auto; touch-action:pan-x pan-y}
#dayGrid.addmode{cursor:crosshair}
.dayCol{position:absolute; top:0; bottom:0; border-left:1px solid var(--line-soft)}
.dayCol:first-child{border-left:none}
.dayCol.weekend{background:rgba(127,127,140,.045)}
.hline{position:absolute; left:0; right:0; height:1px; background:var(--line-soft); pointer-events:none}
.hline.half{opacity:.4; background:transparent; border-top:1px dashed var(--line-soft)}
#nowLine{position:absolute; height:0; border-top:2px solid var(--accent); z-index:9; pointer-events:none}
#nowLine::before{content:""; position:absolute; left:-4px; top:-5px; width:8px; height:8px; border-radius:50%; background:var(--accent)}
.evcard{
  position:absolute; border-radius:var(--r-small);
  color:#ededec; overflow:hidden; cursor:pointer; user-select:none;
  padding:5px 8px; z-index:5;
  transition:filter .12s, box-shadow .12s;
  touch-action:none;
}
.evcard:hover{filter:brightness(1.1); z-index:6}
.evcard.dragging{opacity:.35}
.evcard .et{font-size:12px; font-weight:600; line-height:1.25; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.evcard .em{font-size:10px; opacity:.8; font-weight:500}
.evcard .badges{position:absolute; right:6px; bottom:4px; display:flex; gap:4px; align-items:center}
.evcard .badge{font-size:9px; background:rgba(0,0,0,.28); border-radius:9999px; padding:1px 6px; font-weight:600}
.evcard .rezH{position:absolute; left:0; right:0; height:7px; cursor:ns-resize}
.evcard .rezH.t{top:0}.evcard .rezH.b{bottom:0}
#hoverLine{position:absolute; left:0; right:0; height:0; border-top:1px solid var(--add); z-index:8; pointer-events:none; display:none}
#hoverLab{position:absolute; z-index:16; right:6px; transform:translateY(-50%); display:none;
  font-family:"DM Mono",monospace; font-size:10px; color:var(--add); background:var(--base); padding:0 3px}
.dragPrev{
  position:absolute; border:1.5px dashed var(--text-dim); border-radius:var(--r-small);
  background:rgba(127,127,140,.08); z-index:12; pointer-events:none;
}
.dragPrev::before,.dragPrev::after{content:""; position:absolute; left:-12px; right:-12px; height:0; border-top:1px solid var(--text-dim)}
.dragPrev::before{top:-1px}.dragPrev::after{bottom:-1px}
.snapLab{position:absolute; z-index:16; right:6px; transform:translateY(-50%);
  font-family:"DM Mono",monospace; font-size:10px; color:var(--text); background:var(--base); padding:0 3px; pointer-events:none}

/* ---------- FAB ---------- */
#fab{
  position:fixed; right:22px; bottom:24px; z-index:40;
  width:54px; height:54px; border-radius:50%;
  background:var(--add); color:#fff; box-shadow:0 8px 24px rgba(100,152,192,.4);
  display:flex; align-items:center; justify-content:center;
  transition:transform .22s var(--spring), background .2s;
}
#fab svg{width:22px; height:22px; transition:transform .22s var(--spring)}
#fab.on{background:var(--accent); box-shadow:0 8px 24px rgba(233,71,58,.4)}
#fab.on svg{transform:rotate(45deg)}
#fab:active{transform:scale(.92)}

/* ---------- modal ---------- */
.overlay{
  position:fixed; inset:0; z-index:60; background:rgba(8,8,12,.55);
  display:flex; align-items:center; justify-content:center; padding:18px;
  backdrop-filter:blur(2px);
  animation:fade .18s ease;
}
@keyframes fade{from{opacity:0}}
@keyframes pop{from{opacity:0; transform:scale(.94) translateY(8px)}}
.mcard{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card);
  width:min(440px,100%); max-height:86vh; overflow:auto;
  box-shadow:var(--shadow); animation:pop .22s var(--spring);
}
.mhead{display:flex; align-items:center; gap:10px; padding:14px 16px 0}
.mhead h2{font-size:18px; font-weight:700; flex:1}
.mbody{padding:12px 16px 16px; display:flex; flex-direction:column; gap:12px}
.frow{display:flex; gap:10px}
.frow>*{flex:1}
.field label{display:block; font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px}
.field input,.field select{
  width:100%; background:var(--surface2); border:1px solid var(--line);
  border-radius:var(--r-small); padding:8px 10px; outline:none;
}
.field input:focus,.field select:focus{border-color:var(--c-blue)}
input[type="color"]{padding:2px; height:34px; cursor:pointer}
.seg{display:flex; background:var(--surface2); border:1px solid var(--line); border-radius:9999px; padding:3px; gap:2px}
.seg button{flex:1; border-radius:9999px; padding:5px 10px; font-size:12px; font-weight:600; color:var(--text-dim); white-space:nowrap}
.seg button.on{background:var(--surface3); color:var(--text)}
.catdots{display:flex; flex-wrap:wrap; gap:8px}
.catdot{width:26px; height:26px; border-radius:50%; border:2px solid transparent; transition:transform .15s var(--spring)}
.catdot.on{border-color:var(--text); transform:scale(1.12)}
.rte-tools{display:flex; gap:6px; margin-bottom:6px}
.rte{
  min-height:84px; max-height:200px; overflow:auto; background:var(--surface2);
  border:1px solid var(--line); border-radius:var(--r-small); padding:8px 10px;
  font-size:13px; line-height:1.5; outline:none;
}
.rte:focus{border-color:var(--c-blue)}
.rte ul,.rte ol{padding-left:18px}
.mfoot{display:flex; gap:10px; padding:0 16px 16px; align-items:center}
.btn{
  border-radius:9999px; padding:9px 18px; font-weight:600; font-size:13px;
  background:var(--surface2); border:1px solid var(--line); color:var(--text-dim);
  transition:transform .15s var(--spring), background .15s;
}
.btn:hover{color:var(--text)}
.btn:active{transform:scale(.95)}
.btn.primary{background:var(--add); border-color:transparent; color:#fff}
.btn.danger{color:var(--c-red)}
.mfoot .spacer{flex:1}

/* compact head with three circular action buttons; no footer */
.mhead{ gap:8px; }
.mhead .cbtn.small.danger{ color:var(--c-red); }
.mhead .cbtn.small.primary{
  background:var(--c-blue); color:#fff; border-color:transparent;
}
.mhead .cbtn.small.primary:hover{ background:var(--c-blue); filter:brightness(1.08); }

/* inline borderless title — placeholder doubles as the section heading */
.field.title-field{ margin-bottom:-2px; }
.field.title-field > label{ display:none; }
.field input.title-inline,
.field textarea.title-inline{
  background:transparent; border:none; border-radius:0;
  padding:2px 0; font-size:22px; font-weight:700; color:var(--text);
  width:100%; font-family:inherit; line-height:1.25;
  display:block; resize:none; overflow:hidden;   /* textarea grows via JS on input */
}
.field input.title-inline:focus,
.field textarea.title-inline:focus{ border:none; outline:none; }
.field input.title-inline::placeholder,
.field textarea.title-inline::placeholder{ color:var(--text-faint); font-weight:700; }
.field input.title-inline:focus::placeholder,
.field textarea.title-inline:focus::placeholder{ color:transparent; }

/* description loses its uppercase label */
.field.desc-field > label{ display:none; }

/* head merges title input + action buttons in one row */
.mhead{ padding:12px 16px 6px; align-items:center; }
.mhead .field.title-field{ flex:1; margin:0; min-width:0; }

/* project selector with live color indicator on the right */
.proj-row{ display:flex; gap:8px; align-items:center; }
.proj-row select{ flex:1; min-width:0; }
.proj-col{
  width:26px; height:26px; border-radius:50%; flex:0 0 26px;
  background:var(--text-faint); border:1px solid var(--line);
  transition:background .15s;
}

/* ---------- todos ---------- */
.todoList{display:flex; flex-direction:column; gap:2px}
.todoRow{display:flex; align-items:center; gap:9px; padding:5px 6px; border-radius:var(--r-small)}
.todoRow:hover{background:var(--surface2)}
.tcheck{width:20px; height:20px; flex:0 0 20px; border-radius:50%; border:2px solid var(--text-faint);
  display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff;
  transition:background .15s, border-color .15s, transform .15s var(--spring)}
.tcheck:active{transform:scale(.85)}
.todoRow[data-state="done"] .tcheck{background:var(--success); border-color:var(--success)}
.todoRow[data-state="cancelled"] .tcheck{background:var(--text-faint); border-color:var(--text-faint)}
.todoRow[data-state="postponed"] .tcheck{background:var(--c-amber); border-color:var(--c-amber)}
.todoRow .tx{flex:1; font-size:13px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.todoRow[data-state="done"] .tx{color:var(--text-dim); text-decoration:line-through}
.todoRow[data-state="cancelled"] .tx{color:var(--text-faint); text-decoration:line-through}
.todoRow[data-state="postponed"] .tx{color:var(--c-amber)}
.todoRow .tdel{opacity:0; color:var(--text-faint)}
.todoRow:hover .tdel{opacity:1}
.todoRow .carry{font-size:9px; color:var(--c-amber); border:1px solid var(--c-amber); border-radius:9999px; padding:0 6px; font-weight:600}
.todoAdd{display:flex; gap:8px}
.todoAdd input{flex:1; background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-small); padding:7px 10px; outline:none}
.todoAdd input:focus{border-color:var(--c-blue)}
.thint{font-size:10.5px; color:var(--text-faint)}

/* todo popover on event card click */
#pop{
  position:fixed; z-index:55; width:300px;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r-card);
  box-shadow:var(--shadow); padding:12px 12px 12px;
  animation:pop .22s var(--spring);
}
#pop .pt{font-size:14px; font-weight:700; margin-bottom:1px; padding-right:30px}
#pop .pm{font-size:11px; color:var(--text-dim); margin-bottom:9px}
#pop .pclose{position:absolute; right:8px; top:8px}

/* ---------- settings panel ---------- */
#setPanel{
  position:fixed; top:0; right:0; bottom:0; z-index:50; width:min(330px,92vw);
  background:var(--surface); border-left:1px solid var(--line);
  box-shadow:var(--shadow); padding:18px 18px 30px; overflow:auto;
  transform:translateX(105%); transition:transform .3s var(--soft);
  display:flex; flex-direction:column; gap:18px;
}
#setPanel.open{transform:translateX(0)}
#setPanel h2{font-size:18px}
#setPanel section h3{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-faint); margin-bottom:8px; font-weight:600}
.catRow{display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap}
.catRow input[type="color"]{width:34px; flex:0 0 34px; background:var(--surface2); border:1px solid var(--line); border-radius:50%; height:34px; overflow:hidden}
.catRow input[type="text"]{flex:1; min-width:120px; background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-small); padding:7px 10px; outline:none}
.catRow input[type="date"]{flex:0 0 auto; background:var(--surface2); border:1px solid var(--line); border-radius:var(--r-small); padding:6px 8px; color:var(--text); font-size:12px; outline:none}
.catRow .colDot{width:26px; height:26px; flex:0 0 26px; border-radius:50%; border:1px solid var(--line)}

/* color picker (7 swatches, grey reserved) */
.cpicker{display:flex; flex-wrap:wrap; gap:8px; margin:6px 0}
.cpicker .csw{
  width:30px; height:30px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; transition:transform .15s var(--spring), opacity .15s;
  padding:0;
}
.cpicker .csw.on{ border-color:var(--text); transform:scale(1.12) }
.cpicker .csw.taken{ opacity:.25; cursor:not-allowed; transform:scale(.85) }

/* inline add-form for projects/categories in settings */
.add-form{
  background:var(--surface2); border:1px solid var(--line);
  border-radius:var(--r-small); padding:10px; margin-top:6px;
  display:flex; flex-direction:column; gap:8px;
}
.add-form input[type="text"], .add-form input[type="date"]{
  background:var(--base); border:1px solid var(--line); border-radius:var(--r-small);
  padding:7px 10px; color:var(--text); outline:none; font-size:13px;
}
.add-form .af-dates{ display:flex; gap:8px }
.add-form .af-dates input{ flex:1; min-width:0 }
.add-form .af-actions{ display:flex; gap:8px; justify-content:flex-end }
.note{font-size:11.5px; color:var(--text-faint); line-height:1.5}

/* ---------- budget overlay ---------- */
#budgetPage .mcard{width:min(480px,100%)}
.donutWrap{display:flex; gap:20px; align-items:center; padding:6px 0}
.donutWrap svg{flex:0 0 auto}
.legend{flex:1; display:flex; flex-direction:column; gap:6px; min-width:0}
.legRow{display:flex; align-items:center; gap:8px; font-size:12.5px}
.legRow .dot{width:10px; height:10px; border-radius:50%; flex:0 0 auto}
.legRow .nm{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-dim)}
.legRow .hrs{font-family:"DM Mono",monospace; font-size:11px}
.donutCenter{font-family:"DM Mono",monospace; fill:var(--text); font-size:17px; font-weight:500}
.donutSub{fill:var(--text-faint); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; font-family:"DM Sans",sans-serif}

/* ---------- toast ---------- */
#toast{
  position:fixed; left:50%; bottom:26px; transform:translate(-50%,80px); z-index:70;
  background:var(--surface3); border:1px solid var(--line); color:var(--text);
  padding:8px 18px; border-radius:9999px; font-size:12.5px; font-weight:500;
  transition:transform .3s var(--spring), opacity .2s; opacity:0; pointer-events:none;
  box-shadow:var(--shadow);
}
#toast.show{transform:translate(-50%,0); opacity:1}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important; transition-duration:.01ms !important}
}
@media (max-width:640px){
  :root{--rail-w:52px}
  #topdate{display:none}
  .bubble{max-width:260px}
}
</style>

"use strict";
/* ════════════════════════════════════════════════════════════
   data — types, constants, palette, seed data
   ════════════════════════════════════════════════════════════ */
const STORE_KEY  = "timeline.app.v2";
const NOTIF_STORE= "timeline.notif.v2";
const HOUR_START = 0, HOUR_END = 24, HOUR_PX = 52;
const GRID_H     = (HOUR_END - HOUR_START) * HOUR_PX;
let   TL_PPD     = 160;              // unified px/day — both views share one grid
const SNAP       = 15;               // minutes
const PALETTE    = ["#f4971f","#e9473a","#40838b","#6498c0","#8fc14e","#90909a","#a060c8","#d86e9a"];

const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);

function seedData(){
  const t = new Date(); t.setHours(0,0,0,0);
  const d = n => isoDate(addDays(t, n));
  return {
    /* unified tracks: entries with start&end are projects (get a spine);
       entries without dates are categories (named color only). Grey is reserved for "frei". */
    categories: [
      { id:"seminar", name:"Seminararbeit", color:"#40838b",
        start:d(-14), end:d(28),
        milestones:[
          { id:uid(), date:d(4),  label:"Entwurf fertig", end:false },
          { id:uid(), date:d(11), label:"Review",         end:false },
          { id:uid(), date:d(18), label:"Abgabe + Präsentation", end:true },

/* ════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════ */
const DAY_MS = 86400000;
function isoDate(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseISO(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function diffDays(a,b){ return Math.round((parseISO(b)-parseISO(a))/DAY_MS); }
function todayISO(){ const t=new Date(); return isoDate(t); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function fmtMin(m){ return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }
function snapMin(m){ return clamp(Math.round(m/SNAP)*SNAP, HOUR_START*60, HOUR_END*60); }
const WD = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const MONTHS = ["Jänner","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
function fmtDateLong(s){ const d=parseISO(s); return WD[d.getDay()]+", "+d.getDate()+". "+MONTHS[d.getMonth()]+" "+d.getFullYear(); }
function esc(s){ return String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function sanitize(html){
  const ALLOW = new Set(["B","I","U","EM","STRONG","UL","OL","LI","BR","P","DIV","SPAN"]);
  const box = document.createElement("div"); box.innerHTML = html;
  (function walk(node){
    [...node.children].forEach(ch=>{
      if(!ALLOW.has(ch.tagName)){ ch.replaceWith(...ch.childNodes); walk(node); }
      else { [...ch.attributes].forEach(a=>ch.removeAttribute(a.name)); walk(ch); }
    });
  })(box);
  return box.innerHTML;
}
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>el.classList.remove("show"), 1900);
}

function loadFromStorage(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const d = JSON.parse(raw); if(d && d.categories) return migrateData(d); }
  }catch(e){ console.warn("load failed", e); }
  return seedData();
}
/* migrate older storage shape (separate categories+projects, projectId on phases) to the unified tracks model */
function migrateData(d){
  /* 1. absorb each project into its linked category (project consumes that color slot) */
  if(Array.isArray(d.projects) && d.projects.length){
    d.projects.forEach(p=>{
      const c = d.categories && d.categories.find(c=>c.id===p.categoryId);
      if(!c) return;
      c.name = p.name;
      c.milestones = p.milestones || [];
      const dates = [
        ...(d.phases||[]).filter(ph=>ph.projectId===p.id).flatMap(ph=>[ph.start, ph.end]),
        ...(p.milestones||[]).map(m=>m.date),
      ].filter(Boolean);
      if(dates.length){
        c.start = dates.reduce((a,b)=> a<b?a:b);
        c.end   = dates.reduce((a,b)=> a>b?a:b);
      } else {
        c.start = todayISO();
        c.end   = isoDate(addDays(new Date(), 30));
      }
      /* phases that previously belonged to this project via projectId — re-point to its absorbed category, preserving intent over color-mismatch */
      (d.phases||[]).forEach(ph=>{ if(ph.projectId===p.id) ph.categoryId = c.id; });
    });
    delete d.projects;
  }
  /* 2. grey is reserved for "frei": drop any track that claims it; re-point refs to null */
  if(Array.isArray(d.categories)){
    const grey = "#90909a";
    const dropIds = new Set(d.categories.filter(c=>c.color===grey).map(c=>c.id));
    if(dropIds.size){
      d.categories = d.categories.filter(c=>!dropIds.has(c.id));
      (d.phases||[]).forEach(p=>{ if(dropIds.has(p.categoryId)) p.categoryId = null; });
      (d.events||[]).forEach(e=>{ if(dropIds.has(e.categoryId)) e.categoryId = null; });
    }
  }
  /* 3. drop now-redundant projectId field from phases */
  (d.phases||[]).forEach(p=>delete p.projectId);
  return d;
}

/* ════════════════════════════════════════════════════════════
   layout — recomputeRange(), lane packing, occurrence expansion
   ════════════════════════════════════════════════════════════ */
/* Time is unbounded — render a generous window around today plus any data
   outside it, and extend either edge when the user scrolls near it. */
const PAST_DAYS = 180, FUTURE_DAYS = 540;
const EDGE_BUFFER_PX = 600, EXTEND_DAYS = 180;

function recomputeRange(){
  let min = todayISO(), max = todayISO();
  const see = d => { if(d){ if(d<min) min=d; if(d>max) max=d; } };
  S.phases.forEach(p=>{ see(p.start); see(p.end); });
  S.exams.forEach(x=>see(x.date));
  S.events.forEach(e=>see(e.date));
  S.categories.forEach(c=>(c.milestones||[]).forEach(m=>see(m.date)));
  S.categories.forEach(c=>{ if(c.start && c.end){ see(c.start); see(c.end); } });

  /* never shrink an existing range — only widen it */
  let startISO = UI.range.start || isoDate(addDays(parseISO(todayISO()), -PAST_DAYS));
  const want = isoDate(addDays(parseISO(min), -14));
  if(want < startISO) startISO = want;
  const sd = parseISO(startISO);
  startISO = isoDate(addDays(sd, -((sd.getDay()+6)%7))); /* snap to Monday */

  let endISO = isoDate(addDays(parseISO(todayISO()), FUTURE_DAYS));
  const dataEnd = isoDate(addDays(parseISO(max), 35));
  if(dataEnd > endISO) endISO = dataEnd;
  if(UI.range.start){
    const prevEnd = isoDate(addDays(parseISO(UI.range.start), UI.range.days));
    if(prevEnd > endISO) endISO = prevEnd;
  }
  UI.range.start = startISO;
  UI.range.days  = diffDays(startISO, endISO);
}
const dayIdx  = d => diffDays(UI.range.start, d);
const idxDate = i => isoDate(addDays(parseISO(UI.range.start), i));
function dayPPD(){
  const vw = document.getElementById("dayWrap").clientWidth || window.innerWidth;
  return Math.max(120, (vw - railW()) / S.settings.density);
}
function railW(){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--rail-w")) || 68; }

/* greedy interval lane packing for phase bars */
function packLanes(items){
  const lanes = [];
  items.slice().sort((a,b)=> a.start<b.start?-1:1).forEach(it=>{
    let lane = lanes.find(l => l[l.length-1].end < it.start);
    if(!lane){ lane = []; lanes.push(lane); }
    lane.push(it); it._lane = lanes.indexOf(lane);
  });
  return lanes.length;
}

/* repeat expansion: does event ev occur on dateISO? */
function occursOn(ev, dateISO){
  if(dateISO < ev.date) return false;
  if(ev.repeat === "none" || !ev.repeat) return ev.date === dateISO;
  const base = parseISO(ev.date), d = parseISO(dateISO);
  switch(ev.repeat){
    case "daily":    return true;
    case "weekly":   return base.getDay() === d.getDay();
    case "weekdays": return d.getDay() >= 1 && d.getDay() <= 5;
    case "monthly": {
      const want = base.getDate();
      const last = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
      return d.getDate() === Math.min(want, last);   // 29/30/31 clamp
    }
  }
  return false;
}
/* all occurrences (ev × date) in [fromISO, toISO] inclusive */
function occurrencesIn(fromISO, toISO){
  const out = [];
  const n = diffDays(fromISO, toISO);
  for(let i=0;i<=n;i++){
    const d = isoDate(addDays(parseISO(fromISO), i));
    S.events.forEach(ev=>{ if(occursOn(ev,d)) out.push({ ev, date:d }); });
  }
  return out;
}
/* latest occurrence date of an event up to a given date */
function latestOccurrence(ev, uptoISO){
  if(ev.repeat==="none" || !ev.repeat) return ev.date <= uptoISO ? ev.date : null;
  for(let i=0;i<730;i++){
    const d = isoDate(addDays(parseISO(uptoISO), -i));
    if(d < ev.date) return null;
    if(occursOn(ev,d)) return d;
  }
  return null;
}

function appendPhaseLanes(frag, phases, W){
  if(!phases.length) return;
  const nLanes = packLanes(phases);
  /* group phases by their packed lane so each lane row owns its own bubble rows */
  const byLane = Array.from({length:nLanes}, ()=>[]);
  phases.forEach(ph => byLane[ph._lane].push(ph));

  for(let l = 0; l < nLanes; l++){
    const r = document.createElement("div"); r.className = "tlRow laneRow";
    frag.appendChild(r);

    byLane[l].forEach(ph => {
      const x = dayIdx(ph.start)*TL_PPD, w = Math.max((diffDays(ph.start, ph.end)+1)*TL_PPD, 26);
      const el = document.createElement("div");

       after the lane row so the popup always sits under its parent bar */
    byLane[l].forEach(ph => {

}

      .map(ev=>({ev, s:ev.startMin, e:ev.endMin}))
      .sort((a,b)=> a.s-b.s || b.e-a.e);

function eventCard(ev, dIso, x, w){
