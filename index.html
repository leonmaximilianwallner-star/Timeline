<script>
const DAY_MS = 86400000;
const S = new Date(2026, 4, 9);
const E = new Date(2026, 6, 1);
const TOTAL_DAYS = Math.round((E - S) / DAY_MS);
const timelineRows = { PY: 30, SY: 90, EY: 134, CTR: 175, VY: 212 };
let currentLayout = null;

function placerLanes(items, getFrom, getTo) {
  const laneEnds = [];
  const itemLane = new Map();
  [...items].sort((a, b) => getFrom(a) - getFrom(b)).forEach(item => {
    const from = getFrom(item);
    const to   = Math.max(from + 1, getTo(item));
    let lane   = laneEnds.findIndex(end => end <= from);
    if (lane === -1) lane = laneEnds.length;
    laneEnds[lane] = to;
    itemLane.set(item.id, lane);
  });
  return { itemLane, laneCount: Math.max(1, laneEnds.length) };
}

function computeLayout() {
  const layout = { items: {}, projLineCY: {}, contentTop: 0, totalH: 0 };
  const PROJ_H = L.PROJ_ABOVE + L.PROJ_LINE + L.PROJ_BELOW;
  let y = L.WEEK_H + 4;
  layout.contentTop = y;
  const linkedCatIds = new Set(projects.map(p => p.categoryId));
  projects.forEach((proj, i) => {
    if (i > 0) y += L.SECT_GAP / 2;
    layout.items[proj.id] = { y, type: 'project' };
    layout.projLineCY[proj.id] = y + L.PROJ_ABOVE + L.PROJ_LINE / 2;
    const linked = phases.filter(ph => ph.categoryId === proj.categoryId);
    if (linked.length) {
      const phasesTop = y + PROJ_H + L.ITEM_GAP;
      const { itemLane, laneCount } = placerLanes(linked, ph => dateFromISO(ph.f).getTime(), ph => dateFromISO(ph.t).getTime());
      linked.forEach(ph => { layout.items[ph.id] = { y: phasesTop + (itemLane.get(ph.id)||0) * (L.ITEM_H + L.ITEM_GAP), type: 'phase' }; });
      y = phasesTop + laneCount * (L.ITEM_H + L.ITEM_GAP) + L.SECT_GAP;
    } else { y += PROJ_H + L.SECT_GAP; }
  });
  const free = phases.filter(ph => !linkedCatIds.has(ph.categoryId));
  if (free.length) {
    const { itemLane, laneCount } = placerLanes(free, ph => dateFromISO(ph.f).getTime(), ph => dateFromISO(ph.t).getTime());
    free.forEach(ph => { layout.items[ph.id] = { y: y + (itemLane.get(ph.id)||0) * (L.ITEM_H + L.ITEM_GAP), type: 'phase' }; });
    y += laneCount * (L.ITEM_H + L.ITEM_GAP) + L.SECT_GAP;
  }
  layout.examSectionY = y;
  if (fixedExams.length) {
    const { itemLane, laneCount } = placerLanes(fixedExams, ex => dateFromISO(ex.d).getTime(), ex => dateFromISO(ex.d).getTime() + 2 * DAY_MS);
    fixedExams.forEach(ex => { layout.items[ex.id] = { y: y + (itemLane.get(ex.id)||0) * (L.EXAM_H + L.ITEM_GAP), type: 'exam' }; });
    y += laneCount * (L.EXAM_H + L.ITEM_GAP) + L.SECT_GAP;
  }
  layout.eventSectionY = y;
  if (privateEvents.length) {
    const { itemLane, laneCount } = placerLanes(privateEvents, ev => dateFromISO(ev.f).getTime(), ev => dateFromISO(ev.t).getTime());
    privateEvents.forEach(ev => { layout.items[ev.id] = { y: y + (itemLane.get(ev.id)||0) * (L.ITEM_H + L.ITEM_GAP), type: 'event' }; });
    y += laneCount * (L.ITEM_H + L.ITEM_GAP) + L.SECT_GAP;
  }
  if (noteItems.length) {
    const { itemLane, laneCount } = placerLanes(noteItems, n => dateFromISO(n.date).getTime(), n => dateFromISO(n.date).getTime() + 2 * DAY_MS);
    noteItems.forEach(n => { layout.items[n.id] = { y: y + (itemLane.get(n.id)||0) * (L.NOTE_H + L.ITEM_GAP), type: 'note' }; });
    y += laneCount * (L.NOTE_H + L.ITEM_GAP);
  }
  layout.totalH   = Math.max(220, y + 28);
  layout.dailyTop = Math.max(100, y - L.SECT_GAP / 2 + 4);
  return layout;
}

const tl = document.getElementById('tl');
const tlOuter = document.getElementById('tlOuter');
const hourRail = document.getElementById('hourRail');
const viewToggle    = document.getElementById('viewToggle');
const addToggle     = document.getElementById('addToggle');
const undoBtn       = document.getElementById('undoBtn');
const redoBtn       = document.getElementById('redoBtn');
const settingsBtn   = document.getElementById('settingsBtn');
const settingsModal = document.getElementById('settingsModal');
const settingsClose = document.getElementById('settingsClose');
const todayText     = document.getElementById('todayText');
const themeToggle   = document.getElementById('themeToggle');
const saveBtn       = document.getElementById('saveBtn');

let undoStack = [], redoStack = [];
const MAX_UNDO = 50;
function snapshotState() { return JSON.stringify({ phases, privateEvents, fixedExams, noteItems, categories, projects, dailyItems, openPoints }); }
function pushUndo() { undoStack.push(snapshotState()); if (undoStack.length > MAX_UNDO) undoStack.shift(); redoStack = []; updateUndoButtons(); }
function restoreSnapshot(snap) {
  const d = JSON.parse(snap);
  if (d.phases)        phases        = d.phases;
  if (d.privateEvents) privateEvents = d.privateEvents;
  if (d.fixedExams)    fixedExams    = d.fixedExams;
  if (d.noteItems)     noteItems     = d.noteItems;
  if (d.categories && d.categories.length) categories = d.categories;
  if (d.projects)      projects      = d.projects;
  if (d.dailyItems)    dailyItems    = d.dailyItems;
  if (d.openPoints)    openPoints    = d.openPoints;

function computeDayLanes(items) {
  if (!items.length) return new Map();
  const sorted = [...items].sort((a, b) => a.startMin - b.startMin);
  const colEnds = [];
  const colOf = new Map();
  for (const it of sorted) {
    let placed = false;
    for (let c = 0; c < colEnds.length; c++) {
      if (colEnds[c] <= it.startMin) { colEnds[c] = it.endMin; colOf.set(it.id, c); placed = true; break; }
    }
    if (!placed) { colOf.set(it.id, colEnds.length); colEnds.push(it.endMin); }
  }
  const numCols = colEnds.length;
  const result = new Map();
  items.forEach(it => result.set(it.id, { colIdx: colOf.get(it.id) ?? 0, numCols }));
  return result;
}

function startResize(ph, side, el, evt) { evt.preventDefault(); evt.stopPropagation(); resizeDrag = { ph, side, startX: evt.clientX, origF: ph.f, origT: ph.t, el }; document.body.style.userSelect = 'none'; document.body.style.cursor = side === 'left' ? 'w-resize' : 'e-resize'; }

function getDailyItemInstances(item) {
  const orig = dateFromISO(item.date); const repeat = item.repeat || 'none'; const dates = [];
  for (let d = new Date(S); d < E; d = new Date(d.getTime() + DAY_MS)) {
    if (repeat === 'none' && d.toDateString() === orig.toDateString()) dates.push(new Date(d));
    else if (d >= orig) {
      if (repeat === 'daily') dates.push(new Date(d));
      else if (repeat === 'weekly'   && d.getDay()  === orig.getDay())  dates.push(new Date(d));
      else if (repeat === 'monthly'  && d.getDate() === orig.getDate()) dates.push(new Date(d));
      else if (repeat === 'weekdays' && d.getDay() >= 1 && d.getDay() <= 5) dates.push(new Date(d));
    }
  }
  return dates;

function removeById(id) { phases = phases.filter(x => x.id !== id); privateEvents = privateEvents.filter(x => x.id !== id); fixedExams = fixedExams.filter(x => x.id !== id); noteItems = noteItems.filter(x => x.id !== id); dailyItems = dailyItems.filter(x => x.id !== id); }
async function saveToStorage() {
  const data = { phases, privateEvents, fixedExams, noteItems, categories, projects, dailyItems, openPoints, savedAt: new Date().toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  try {
    saveBtn.textContent = 'Syncing…';
    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH',
      headers: { 'Authorization': `token ${getToken()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(data) } } })
    });
    saveBtn.textContent = 'Saved';
  } catch(e) {
    saveBtn.textContent = 'Gespeichert (lokal)';
  }
  setTimeout(() => { saveBtn.textContent = 'Save'; }, 1500);
}
async function loadFromStorage() {
  let parsed = null;
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${getToken()}` }
    });
    const json = await res.json();
    const content = json.files?.[GIST_FILE]?.content;
    if (content && content !== '{}') parsed = JSON.parse(content);

    // show last saved date in subtitle
    if (json.updated_at) { // e.g. "2026-05-15T14:32:00Z"
      const d = new Date(json.updated_at);
      document.getElementById('subtitleRange').textContent =
        ` · last change ${formatDateEN(d)} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

  } catch(e) {}
  if (!parsed) {
    try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) parsed = JSON.parse(raw); } catch(e) {} 
  }
  if (!parsed) return;
  if (Array.isArray(parsed.phases))        phases        = parsed.phases;
  if (Array.isArray(parsed.privateEvents)) privateEvents = parsed.privateEvents;
  if (Array.isArray(parsed.fixedExams))    fixedExams    = parsed.fixedExams;
  if (Array.isArray(parsed.noteItems))     noteItems     = parsed.noteItems;
  if (Array.isArray(parsed.categories) && parsed.categories.length) categories = parsed.categories;
  if (Array.isArray(parsed.projects)   && parsed.projects.length)   projects   = parsed.projects;
  if (Array.isArray(parsed.dailyItems))    dailyItems    = parsed.dailyItems;
  if (Array.isArray(parsed.openPoints) && parsed.openPoints.length) openPoints = parsed.openPoints;
}

// ── Touch support ──────────────────────────────────────────────
function normTouch(e) {
  const t = e.touches?.[0] || e.changedTouches?.[0];
  return { clientX: t.clientX, clientY: t.clientY };
}

// ── Pointer events for tlOuter (pinch + add-mode drag) ──
const activePointers = new Map();

tlOuter.addEventListener('pointerdown', (e) => {
  console.log('pointerdown', e.pointerType, activePointers.size);
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 2 && isDailyView) {
    e.preventDefault();
    const pts = [...activePointers.values()];
    const dx = pts[0].x - pts[1].x;
    const dy = pts[0].y - pts[1].y;
    pinchStartDist = Math.hypot(dx, dy);
    pinchStartRowH = DAY_VIEW.rowHeight;
    return;
  }

  if (activePointers.size === 1 && addMode) {
    e.preventDefault();
    const tlRect = tl.getBoundingClientRect();
    const localY = e.clientY - tlRect.top;
    if (isDailyView && localY >= DAY_VIEW.top) {
      const date = dateFromTimelineClientX(e.clientX);
      const m = minFromLocalY(localY);
      dailyDrag = { date, startMin: m, currentMin: m, previewEl: null };
      drawDailyPreview();
      return;
    }
    dragStartDate = dateFromTimelineClientX(e.clientX);
    dragMoved = false;
    clearDragPreview();
  }
});

tlOuter.addEventListener('pointermove', (e) => {
  if (!activePointers.has(e.pointerId)) return;
  activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

  if (activePointers.size === 2 && isDailyView && pinchStartDist) {
    e.preventDefault();
    const pts = [...activePointers.values()];
    const dx = pts[0].x - pts[1].x;
    const dy = pts[0].y - pts[1].y;
    const dist = Math.hypot(dx, dy);
    const newH = Math.round(
      Math.max(ROW_H_MIN, Math.min(ROW_H_MAX, pinchStartRowH * (dist / pinchStartDist)))
    );
    if (newH !== DAY_VIEW.rowHeight) {
      DAY_VIEW.rowHeight = newH;
      rowHeightLevel = newH < 33 ? 0 : newH < 66 ? 1 : 2;
      requestAnimationFrame(() => renderAll());
    }
  }
});

const endPointer = (e) => {
  activePointers.delete(e.pointerId);
  if (activePointers.size < 2) pinchStartDist = null;
};
tlOuter.addEventListener('pointerup', endPointer);
tlOuter.addEventListener('pointercancel', endPointer);

// Drag move
window.addEventListener('touchmove', (e) => {
  const anyDrag = dailyDrag || dragStartDate || dailyItemResizeDrag ||
                  dailyItemMoveDrag || daySizeDrag || resizeDrag;
  if (!anyDrag && e.touches.length === 1) return;                
  if (anyDrag) e.preventDefault();
  const { clientX, clientY } = normTouch(e);

  if (daySizeDrag) {
    const delta = clientY - daySizeDrag.startY;
    const newLevel = Math.max(0, Math.min(2, daySizeDrag.startLevel + Math.round(delta / 55)));
    if (newLevel !== rowHeightLevel) { rowHeightLevel = newLevel; renderAll(); }
    return;
  }
  if (resizeDrag) {
    const { ph, side, startX, origF, origT, el } = resizeDrag;
    const daysDelta = Math.round((clientX - startX) / (tl.offsetWidth / TOTAL_DAYS));
    if (side === 'right') {
      const ms = Math.max(dateFromISO(origF).getTime() + DAY_MS, Math.min(E.getTime(), dateFromISO(origT).getTime() + daysDelta * DAY_MS));
      el.style.width = `${widthPct(origF, toISODate(new Date(ms)))}%`;
    } else {
      const ms = Math.min(dateFromISO(origT).getTime() - DAY_MS, Math.max(S.getTime(), dateFromISO(origF).getTime() + daysDelta * DAY_MS));
      const ns = toISODate(new Date(ms));
      el.style.left = `${pctFromDate(ns)}%`;
      el.style.width = `${widthPct(ns, origT)}%`;
    }
    return;
  }
  if (dailyItemResizeDrag) {
    const { edge, startY: sy, origStartMin, origEndMin, el } = dailyItemResizeDrag;
    const deltaMin = snapMin(Math.round((clientY - sy) / DAY_VIEW.rowHeight * 60));
    if (edge === 'top') {
      const newStart = Math.max(DAY_VIEW.fromHour * 60, Math.min(origStartMin + deltaMin, origEndMin - 15));
      el.style.top = `${yFromMin(newStart)}px`;
      el.style.height = `${Math.max(14, yFromMin(origEndMin) - yFromMin(newStart) - 2)}px`;
    } else {
      const newEnd = Math.min(DAY_VIEW.toHour * 60, Math.max(origEndMin + deltaMin, origStartMin + 15));
      el.style.height = `${Math.max(14, yFromMin(newEnd) - yFromMin(origStartMin) - 2)}px`;
    }
    return;
  }
  if (dailyItemMoveDrag) {
    const { ghost, offsetY } = dailyItemMoveDrag;
    const tlRect = tl.getBoundingClientRect();
    const snappedMin = Math.max(DAY_VIEW.fromHour * 60, Math.min(DAY_VIEW.toHour * 60 - 15, snapMin(minFromLocalY(clientY - tlRect.top - offsetY))));
    const targetDate = dateFromTimelineClientX(clientX);
    ghost.style.top  = `${tlRect.top + yFromMin(snappedMin)}px`;
    ghost.style.left = `${tlRect.left + (pctFromDate(targetDate) / 100) * tl.offsetWidth - tlOuter.scrollLeft}px`;
    return;
  }
  if (dailyDrag) {
    dailyDrag.currentMin = minFromLocalY(clientY - tl.getBoundingClientRect().top);
    drawDailyPreview();
    return;
  }
  if (addMode && dragStartDate) {
    dragMoved = true;
    drawDragPreview(dragStartDate, dateFromTimelineClientX(clientX));
  }
}, { passive: false });

// Drag end — commit
window.addEventListener('touchend', (e) => {
  const { clientX, clientY } = normTouch(e);

  if (dailyItemMoveDrag) {
    const { item, offsetY, ghost } = dailyItemMoveDrag;
    ghost.remove(); dailyItemMoveDrag = null;
    document.body.style.userSelect = '';
    const tlRect = tl.getBoundingClientRect();
    const targetStart = Math.max(DAY_VIEW.fromHour * 60, Math.min(DAY_VIEW.toHour * 60 - 15, snapMin(minFromLocalY(clientY - tlRect.top - offsetY))));
    const duration = item.endMin - item.startMin;
    item.date     = toISODate(dateFromTimelineClientX(clientX));
    item.startMin = targetStart;
    item.endMin   = Math.min(DAY_VIEW.toHour * 60, targetStart + duration);
    renderAll(); return;
  }
  if (dailyItemResizeDrag) {
    const { item, edge, startY: sy, origStartMin, origEndMin } = dailyItemResizeDrag;
    const deltaMin = snapMin(Math.round((clientY - sy) / DAY_VIEW.rowHeight * 60));
    if (edge === 'top') item.startMin = Math.max(DAY_VIEW.fromHour * 60, Math.min(origStartMin + deltaMin, origEndMin - 15));
    else                item.endMin   = Math.min(DAY_VIEW.toHour * 60,   Math.max(origEndMin   + deltaMin, origStartMin + 15));
    lastResizeEnd = Date.now(); dailyItemResizeDrag = null; renderAll(); return;
  }
  if (daySizeDrag) {
    daySizeDrag = null;
    document.getElementById('daySizeStrip')?.classList.remove('dragging');
    return;
  }
  if (resizeDrag) {
    const { ph, side, startX, origF, origT } = resizeDrag;
    const daysDelta = Math.round((clientX - startX) / (tl.offsetWidth / TOTAL_DAYS));
    if (side === 'right') ph.t = toISODate(new Date(Math.max(dateFromISO(origF).getTime() + DAY_MS, Math.min(E.getTime(), dateFromISO(origT).getTime() + daysDelta * DAY_MS))));
    else                  ph.f = toISODate(new Date(Math.min(dateFromISO(origT).getTime() - DAY_MS, Math.max(S.getTime(), dateFromISO(origF).getTime() + daysDelta * DAY_MS))));
    lastResizeEnd = Date.now(); resizeDrag = null; renderAll(); return;
  }
  if (dailyDrag) {
    const startMin = Math.min(dailyDrag.startMin, dailyDrag.currentMin);
    const endMin   = Math.max(dailyDrag.startMin + 15, dailyDrag.currentMin);
    dailyStagedPreview = [dailyDrag.previewEl, dailyDrag.topLine, dailyDrag.bottomLine,
      ...hourRail.querySelectorAll('[data-drag]')].filter(Boolean);
    const date = toISODate(dailyDrag.date);
    dailyDrag = null;
    openDraftModal({ mode:'create', type:'daily', track:'daily', start:date, startMin, endMin, categoryId:'', todos:[] });
    return;
  }
  if (!addMode || !dragStartDate) return;
  if (!dragMoved) { dragStartDate = null; clearDragPreview(); return; }
  const endDate  = dateFromTimelineClientX(clientX);
  const start    = dragStartDate <= endDate ? dragStartDate : endDate;
  const end      = dragStartDate <= endDate ? endDate : dragStartDate;
  const daySpan  = Math.round((end - start) / DAY_MS);
  timelineStagedPreview = [dragPreview, dragPreview?._left, dragPreview?._right].filter(Boolean);
  dragPreview = null; dragStartDate = null; dragMoved = false;
  openDraftModal({ mode:'create', type: daySpan >= 1 ? 'range' : 'point', track: daySpan >= 1 ? 'phase' : 'note', start, end, categoryId:'' });
});

// Long-press on daily items to move (500ms hold → drag)
function addItemTouchDrag(el, item) {
  let timer = null;
  el.addEventListener('touchstart', (e) => {
    if (addMode) return;
    const t = e.touches[0];
    const r = el.getBoundingClientRect();
    timer = setTimeout(() => {
      const ghost = el.cloneNode(true);
      ghost.style.cssText += `;position:fixed;opacity:0.7;pointer-events:none;z-index:200;width:${r.width}px;height:${r.height}px;left:${r.left}px;top:${r.top}px;`;
      document.body.appendChild(ghost);
      dailyItemMoveDrag = { item, offsetY: t.clientY - r.top, ghost };
      document.body.style.userSelect = 'none';
    }, 500);
  }, { passive: true });
  el.addEventListener('touchmove',  () => { clearTimeout(timer); timer = null; }, { passive: true });
  el.addEventListener('touchend',   () => { clearTimeout(timer); timer = null; }, { passive: true });
}
// Page-level vertical scroll: keeps dayStickBar pinned to the top of the visible tlOuter area
window.addEventListener('scroll', syncStickBar, { passive: true });

tlOuter.addEventListener('mouseleave', () => { setDailyHover(null); setTimelineHover(null); });

tlOuter.addEventListener('mousedown', (e) => {
  if (!addMode) return;
  e.preventDefault(); e.stopPropagation();
  const tlRect = tl.getBoundingClientRect();
  const localY = e.clientY - tlRect.top;
  if (isDailyView && localY >= DAY_VIEW.top) { const date = dateFromTimelineClientX(e.clientX); const m = minFromLocalY(localY); dailyDrag = { date, startMin: m, currentMin: m, previewEl: null }; drawDailyPreview(); return; }
  dragStartDate = dateFromTimelineClientX(e.clientX); dragMoved = false; clearDragPreview();
});

function drawDailyPreview() {
  if (!dailyDrag) return;
  if (!dailyDrag.previewEl) { const el = document.createElement('div'); el.className = 'daily-preview'; tl.appendChild(el); dailyDrag.previewEl = el; }
  const mkLine = () => { const l = document.createElement('div'); l.style.cssText = `position:absolute;left:0;right:0;height:2px;background:var(--text);opacity:0.45;pointer-events:none;z-index:8;`; tl.appendChild(l); return l; };
  if (!dailyDrag.topLine)    dailyDrag.topLine    = mkLine();
  if (!dailyDrag.bottomLine) dailyDrag.bottomLine = mkLine();
  const ensureRailLabel = (key) => { let lbl = hourRail.querySelector(`[data-drag="${key}"]`); if (!lbl) { lbl = document.createElement('div'); lbl.className = 'hour-label'; lbl.dataset.drag = key; lbl.style.zIndex = '4'; lbl.style.background = 'var(--surface)'; hourRail.appendChild(lbl); } return lbl; };
  const dayLeftPct = pctFromDate(dailyDrag.date); const dayWidthPct = widthPct(toISODate(dailyDrag.date), toISODate(new Date(dailyDrag.date.getTime() + DAY_MS)));
  const a = Math.min(dailyDrag.startMin, dailyDrag.currentMin); const b = Math.max(dailyDrag.startMin + 15, dailyDrag.currentMin);
  const top = yFromMin(a); const height = Math.max(14, yFromMin(b) - top);
  Object.assign(dailyDrag.previewEl.style, { left:`${dayLeftPct}%`, width:`${dayWidthPct}%`, top:`${top}px`, height:`${height}px` });
  dailyDrag.topLine.style.top = `${top}px`; dailyDrag.bottomLine.style.top = `${top + height}px`;
  const startLbl = ensureRailLabel('start'); startLbl.style.top = `${top - DAY_VIEW.top}px`; startLbl.textContent = minToTimeStr(a);
  const endLbl = ensureRailLabel('end'); endLbl.style.top = `${top + height - DAY_VIEW.top}px`; endLbl.textContent = minToTimeStr(b);
}

function clearDailyPreview() {
  if (dailyDrag) { dailyDrag.previewEl?.remove(); dailyDrag.topLine?.remove(); dailyDrag.bottomLine?.remove(); dailyDrag = null; }
  hourRail.querySelectorAll('[data-drag]').forEach(el => el.remove());
  dailyStagedPreview.forEach(el => el?.remove()); dailyStagedPreview = [];
}

window.addEventListener('mousemove', (e) => {
  if (dailyItemCopyDrag) { const { ghost, offsetY } = dailyItemCopyDrag; ghost.style.top = `${e.clientY - offsetY}px`; ghost.style.left = `${e.clientX - ghost.offsetWidth / 2}px`; return; }
  if (dailyItemMoveDrag) { const { item, ghost, offsetY } = dailyItemMoveDrag; const tlRect = tl.getBoundingClientRect(); const itemTopInTl = e.clientY - tlRect.top - offsetY; const snappedMin = Math.max(DAY_VIEW.fromHour*60, Math.min(DAY_VIEW.toHour*60-15, snapMin(minFromLocalY(itemTopInTl)))); const snappedTopVp = tlRect.top + yFromMin(snappedMin); const targetDate = dateFromTimelineClientX(e.clientX); const colLeftVp = tlRect.left + (pctFromDate(targetDate)/100)*tl.offsetWidth - tlOuter.scrollLeft; ghost.style.top = `${snappedTopVp}px`; ghost.style.left = `${colLeftVp}px`; return; }
  if (dailyItemResizeDrag) { const { item, edge, startY: sy, origStartMin, origEndMin, el } = dailyItemResizeDrag; const deltaMin = snapMin(Math.round((e.clientY - sy) / DAY_VIEW.rowHeight * 60)); if (edge === 'top') { const newStart = Math.max(DAY_VIEW.fromHour * 60, Math.min(origStartMin + deltaMin, origEndMin - 15)); const newTop = yFromMin(newStart); el.style.top = `${newTop}px`; el.style.height = `${Math.max(14, yFromMin(origEndMin) - newTop - 2)}px`; } else { const newEnd = Math.min(DAY_VIEW.toHour * 60, Math.max(origEndMin + deltaMin, origStartMin + 15)); el.style.height = `${Math.max(14, yFromMin(newEnd) - yFromMin(origStartMin) - 2)}px`; } return; }
  if (daySizeDrag) { const THRESHOLD = 55; const delta = e.clientY - daySizeDrag.startY; const levelDelta = Math.round(delta / THRESHOLD); const newLevel = Math.max(0, Math.min(2, daySizeDrag.startLevel + levelDelta)); if (newLevel !== rowHeightLevel) { rowHeightLevel = newLevel; renderAll(); } return; }
  if (resizeDrag) { const { ph, side, startX, origF, origT, el } = resizeDrag; const dx = e.clientX - startX; const pxPerDay = tl.offsetWidth / TOTAL_DAYS; const daysDelta = Math.round(dx / pxPerDay); if (side === 'right') { const newEndMs = Math.max(dateFromISO(origF).getTime() + DAY_MS, Math.min(E.getTime(), dateFromISO(origT).getTime() + daysDelta * DAY_MS)); el.style.width = `${widthPct(origF, toISODate(new Date(newEndMs)))}%`; } else { const newStartMs = Math.min(dateFromISO(origT).getTime() - DAY_MS, Math.max(S.getTime(), dateFromISO(origF).getTime() + daysDelta * DAY_MS)); const ns = toISODate(new Date(newStartMs)); el.style.left = `${pctFromDate(ns)}%`; el.style.width = `${widthPct(ns, origT)}%`; } return; }
  if (addMode && !dailyDrag && !daySizeDrag && !resizeDrag && !dragStartDate) { const tlRect = tl.getBoundingClientRect(); const localY = e.clientY - tlRect.top; const PY = currentLayout ? currentLayout.contentTop : 30; const inTimeline = localY >= PY && (!isDailyView || localY < DAY_VIEW.top - 20); if (inTimeline) setTimelineHover(dateFromTimelineClientX(e.clientX)); else setTimelineHover(null); } else { setTimelineHover(null); }
  if (addMode && isDailyView && !dailyDrag && !daySizeDrag && !resizeDrag && !dragStartDate) { const tlRect = tl.getBoundingClientRect(); const localY = e.clientY - tlRect.top; if (localY >= DAY_VIEW.top && localY <= dayViewBottom()) setDailyHover(minFromLocalY(localY)); else setDailyHover(null); }
  if (dailyDrag) { const tlRect = tl.getBoundingClientRect(); dailyDrag.currentMin = minFromLocalY(e.clientY - tlRect.top); drawDailyPreview(); return; }
  if (!addMode || !dragStartDate) return;
  dragMoved = true; drawDragPreview(dragStartDate, dateFromTimelineClientX(e.clientX));
});

window.addEventListener('mouseup', (e) => {
  if (dailyItemCopyDrag) { const { item, offsetY, ghost } = dailyItemCopyDrag; ghost.remove(); document.body.style.cursor = ''; document.body.style.userSelect = ''; dailyItemCopyDrag = null; const targetDate = dateFromTimelineClientX(e.clientX); const tlRect = tl.getBoundingClientRect(); const targetStart = Math.max(DAY_VIEW.fromHour * 60, Math.min(DAY_VIEW.toHour * 60 - 15, snapMin(minFromLocalY(e.clientY - tlRect.top - offsetY)))); const duration = item.endMin - item.startMin; const copiedTodos = (item.todos || []).filter(t => t.state === 'postponed').map(t => ({ id: crypto.randomUUID(), text: t.text, state: 'postponed' })); dailyItems.push({ id: crypto.randomUUID(), date: toISODate(targetDate), startMin: targetStart, endMin: Math.min(DAY_VIEW.toHour * 60, targetStart + duration), title: item.title, categoryId: item.categoryId, todos: copiedTodos, repeat: 'none' }); renderAll(); return; }
  if (dailyItemMoveDrag) { const { item, offsetY, ghost } = dailyItemMoveDrag; ghost.remove(); document.body.style.cursor = ''; document.body.style.userSelect = ''; dailyItemMoveDrag = null; const targetDate = dateFromTimelineClientX(e.clientX); const tlRect = tl.getBoundingClientRect(); const itemTopInTl = e.clientY - tlRect.top - offsetY; const targetStart = Math.max(DAY_VIEW.fromHour * 60, Math.min(DAY_VIEW.toHour * 60 - 15, snapMin(minFromLocalY(itemTopInTl)))); const duration = item.endMin - item.startMin; item.date = toISODate(targetDate); item.startMin = targetStart; item.endMin = Math.min(DAY_VIEW.toHour * 60, targetStart + duration); renderAll(); return; }
  if (dailyItemResizeDrag) { const { item, edge, startY: sy, origStartMin, origEndMin } = dailyItemResizeDrag; const deltaMin = snapMin(Math.round((e.clientY - sy) / DAY_VIEW.rowHeight * 60)); if (edge === 'top') item.startMin = Math.max(DAY_VIEW.fromHour * 60, Math.min(origStartMin + deltaMin, origEndMin - 15)); else item.endMin = Math.min(DAY_VIEW.toHour * 60, Math.max(origEndMin + deltaMin, origStartMin + 15)); document.body.style.cursor = ''; document.body.style.userSelect = ''; lastResizeEnd = Date.now(); dailyItemResizeDrag = null; renderAll(); return; }
  if (daySizeDrag) { daySizeDrag = null; document.body.style.cursor = ''; document.body.style.userSelect = ''; const strip = document.getElementById('daySizeStrip'); if (strip) strip.classList.remove('dragging'); return; }
  if (resizeDrag) { const { ph, side, startX, origF, origT } = resizeDrag; const dx = e.clientX - startX; const pxPerDay = tl.offsetWidth / TOTAL_DAYS; const daysDelta = Math.round(dx / pxPerDay); if (side === 'right') { ph.t = toISODate(new Date(Math.max(dateFromISO(origF).getTime() + DAY_MS, Math.min(E.getTime(), dateFromISO(origT).getTime() + daysDelta * DAY_MS)))); } else { ph.f = toISODate(new Date(Math.min(dateFromISO(origT).getTime() - DAY_MS, Math.max(S.getTime(), dateFromISO(origF).getTime() + daysDelta * DAY_MS)))); } document.body.style.cursor = ''; document.body.style.userSelect = ''; lastResizeEnd = Date.now(); resizeDrag = null; renderAll(); return; }
  if (dailyDrag) { const date = toISODate(dailyDrag.date); const startMin = Math.min(dailyDrag.startMin, dailyDrag.currentMin); const endMin = Math.max(dailyDrag.startMin + 15, dailyDrag.currentMin); dailyStagedPreview = [dailyDrag.previewEl, dailyDrag.topLine, dailyDrag.bottomLine, ...hourRail.querySelectorAll('[data-drag]')].filter(Boolean); dailyDrag = null; openDraftModal({ mode: 'create', type: 'daily', track: 'daily', start: date, startMin, endMin, categoryId: '', todos: [] }); return; }
  if (!addMode || !dragStartDate) return;
  if (!dragMoved) { dragStartDate = null; clearDragPreview(); return; }
  const endDate = dateFromTimelineClientX(e.clientX); const start = dragStartDate <= endDate ? dragStartDate : endDate; const end = dragStartDate <= endDate ? endDate : dragStartDate; const daySpan = Math.round((end - start) / DAY_MS);
  timelineStagedPreview = [dragPreview, dragPreview?._left, dragPreview?._right].filter(Boolean);
  dragPreview = null; dragStartDate = null; dragMoved = false;
  openDraftModal({ mode: 'create', type: daySpan >= 1 ? 'range' : 'point', track: daySpan >= 1 ? 'phase' : 'note', start, end, categoryId: '' });
});

draftCancel.addEventListener('click', closeDraftModal);
draftCategory.addEventListener('change', () => { if (pendingDraft?.type === 'daily' && pendingDraft?.mode === 'create') { const existing = draftTodos.filter(t => t.state !== 'postponed'); draftTodos = [...getPostponedTodosForCategory(draftCategory.value), ...existing]; renderTodoEditor(); } });
document.getElementById('draftModal').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { if (e.target.contentEditable === 'true') return; if (e.target.id === 'newTodoText') return; e.preventDefault(); draftSave.click(); }
  if (e.key === 'Backspace' && pendingDraft?.mode === 'edit') { const tag = e.target.tagName.toLowerCase(); if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.contentEditable === 'true') return; e.preventDefault(); draftDelete.click(); }
});
draftDelete.addEventListener('click', () => { if (!pendingDraft || pendingDraft.mode !== 'edit' || !pendingDraft.id) return; pushUndo(); removeById(pendingDraft.id); closeDraftModal(); renderAll(); });
draftSave.addEventListener('click', () => {
  if (!pendingDraft) return;
  const title = draftTitle.value.trim(); const start = draftStart.value; const categoryId = draftCategory.value;
  if (!title || !start) return;
  pushUndo();
  const id = pendingDraft.mode === 'edit' && pendingDraft.id ? pendingDraft.id : crypto.randomUUID();
  const track = pendingDraft.track || (pendingDraft.type === 'range' ? 'phase' : 'note');
  removeById(id);
  if (pendingDraft.type === 'daily') {
    const startMin = Math.min(timeStrToMin(draftStartTime.value), 24*60-15); let endMin = timeStrToMin(draftEndTime.value); if (endMin <= startMin) endMin = startMin + 15;
    const repeat = draftRepeat.value || 'none'; const todos = draftTodos.filter(t => t.text && t.text.trim()).map(t => ({ id: t.id || crypto.randomUUID(), text: t.text.trim(), state: t.state || 'open' }));
    dailyItems.push({ id, date: start, startMin, endMin, title, categoryId, todos, repeat });
  } else {
    const end = draftEnd.value || draftStart.value; const rawHtml = draftDetails.innerHTML.trim(); const details = draftDetails.textContent.trim() ? rawHtml : '';
    if (pendingDraft.type === 'range' && track === 'phase') phases.push({ id, l:title, f:start, t:toISODate(new Date(dateFromISO(end).getTime()+DAY_MS)), categoryId, details });
    else if (pendingDraft.type === 'range' && track === 'event') privateEvents.push({ id, l:title, f:start, t:toISODate(new Date(dateFromISO(end).getTime()+DAY_MS)), categoryId, details });
    else if (pendingDraft.type === 'point' && track === 'exam') fixedExams.push({ id, l:title, d:start, e:'3', p:'top', categoryId, details });
    else noteItems.push({ id, title, date:start, type:'info', categoryId, details });
  }
  closeDraftModal(); renderAll();
});

addTodoBtn.addEventListener('click', () => { const txt = newTodoText.value.trim(); if (!txt) return; draftTodos.push({ id: crypto.randomUUID(), text: txt, state: 'open' }); newTodoText.value = ''; renderTodoEditor(); });
newTodoText.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodoBtn.click(); });
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});

document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fullscreenBtn');
  const isFs = !!document.fullscreenElement;
  btn.innerHTML = isFs
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>`;
  renderAll();
});
window.addEventListener('resize', renderAll);
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') { e.preventDefault(); undoBtn.click(); return; }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redoBtn.click(); return; }
  if (e.key === 'Escape') { if (draftModal.classList.contains('open')) { closeDraftModal(); } else if (addMode) { setAddMode(false); clearDragPreview(); clearDailyPreview(); dragStartDate = null; dragMoved = false; } return; }
  if ((e.key === 'a' || e.key === 'A') && !draftModal.classList.contains('open')) { const tag = e.target.tagName.toLowerCase(); if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.contentEditable === 'true') return; setAddMode(!addMode); }
});
themeToggle.addEventListener('click', () => { const root = document.documentElement; const light = root.getAttribute('data-theme') === 'light'; if (light) { root.removeAttribute('data-theme'); themeToggle.textContent = 'Lightmode'; } else { root.setAttribute('data-theme', 'light'); themeToggle.textContent = 'Darkmode'; } renderAll(); });

(async function init() {
  await loadFromStorage();
  renderOpenPoints(); renderCategorySection(); renderAll(); updateUndoButtons();
})();
</script>
