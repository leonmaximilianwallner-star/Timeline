<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111118">
  <title>Timeline</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <img class="wordmark" src="timeline-wordmark.svg" alt="Timeline">
    <span class="spacer"></span>
    <button class="tbtn" id="btnUndo" title="Rückgängig (Strg+Z)">↩</button>
    <button class="tbtn" id="btnRedo" title="Wiederholen (Strg+Y)">↪</button>
    <button class="tbtn" id="btnBudget" title="Zeitbudget">◔</button>
    <button class="tbtn" id="btnSync" title="Gist-Sync">Sync</button>
    <button class="tbtn" id="btnSettings" title="Einstellungen">⚙</button>
  </header>

  <div class="section-label">Zeitstrahl</div>
  <section class="tl-card">
    <div id="tlOuter"><div id="tlInner"></div></div>
  </section>

  <div class="section-label" id="dailySection">Tagesplan</div>
  <section>
    <div id="dayOuter"><div id="dayInner"></div></div>
  </section>

  <div class="section-label">Offene Punkte</div>
  <section class="op-wrap" id="opWrap"></section>

  <button id="fab" title="Hinzufügen (A)">+</button>

  <aside id="settingsPanel" aria-label="Einstellungen"></aside>
  <div id="settingsBackdrop"></div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script src="layout.js"></script>
  <script src="render.js"></script>
  <script src="modal.js"></script>
  <script src="input.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
